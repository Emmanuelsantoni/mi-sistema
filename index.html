<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1916">
<title>Mi Sistema</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f2f1ed;--card:#fff;--border:#e4e1d8;--border2:#cdc9bc;
  --t1:#1a1916;--t2:#5a5750;--t3:#9c9890;
  --green:#1a9e72;--green-bg:#e0f5ec;--green-dk:#0d6e4f;
  --red:#d63c3c;--red-bg:#fceaea;
  --amber:#c07810;--amber-bg:#faeeda;
  --blue:#2878d4;--blue-bg:#e3f0fb;
  --safe-b:env(safe-area-inset-bottom,0px);

  /* colores por espacio */
  --sc:#7c3aed; --sb:#eeebfd; --sdk:#5428b8;  /* personal */
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;background:var(--bg);color:var(--t1)}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100%}

/* TOP BAR */
.top-bar{flex-shrink:0;background:#1a1916;position:relative;z-index:10}
.top-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 0}
.app-name{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.2px}
.top-date{font-size:11px;color:rgba(255,255,255,.45)}
.space-tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;padding:8px 10px 0}
.space-tabs::-webkit-scrollbar{display:none}
.sp-tab{flex-shrink:0;padding:8px 14px 10px;border:none;background:none;font-size:13px;font-weight:600;color:rgba(255,255,255,.4);cursor:pointer;border-radius:10px 10px 0 0;transition:all .15s;white-space:nowrap}
.sp-tab.on{background:var(--bg);color:var(--sc)}

/* MOD BAR */
.mod-bar{flex-shrink:0;background:#fff;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
.mod-bar::-webkit-scrollbar{display:none}
.mod-tab{flex-shrink:0;padding:10px 14px;border:none;background:none;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;position:relative;white-space:nowrap;transition:color .13s}
.mod-tab.on{color:var(--sc);font-weight:700}
.mod-tab.on::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2.5px;background:var(--sc);border-radius:2px 2px 0 0}

/* ALERT STRIP */
.astrip-wrap{flex-shrink:0;overflow:hidden}
.astrip{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 12px;background:#fff;border-bottom:1px solid var(--border)}
.astrip::-webkit-scrollbar{display:none}
.astrip-item{flex-shrink:0;padding:6px 8px 6px 0;font-size:12px;font-weight:500;white-space:nowrap;display:flex;align-items:center;gap:4px}
.astrip-item.red{color:var(--red)}.astrip-item.amber{color:var(--amber)}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 24px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.card-ttl{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:11px}

/* FORMS */
.fg{display:grid;gap:8px;margin-bottom:8px}
.fg2{grid-template-columns:1fr 1fr}
.fg3{grid-template-columns:1fr 1fr 1fr}
.lbl{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:3px}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:8px;font-size:15px;font-family:inherit;background:#fff;color:var(--t1);outline:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--sc);box-shadow:0 0 0 3px color-mix(in srgb,var(--sc) 15%,transparent)}
textarea{resize:vertical;min-height:60px}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{padding:5px 12px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid transparent;user-select:none;transition:all .12s}

/* BUTTONS */
.btn-p{background:var(--sc);border:1px solid var(--sdk);color:#fff;width:100%;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-sec{background:#fff;border:1px solid var(--border2);color:var(--t1);padding:9px 14px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-xs{padding:4px 9px;font-size:12px;border-radius:6px;border:1px solid;cursor:pointer;font-weight:600;white-space:nowrap}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{padding:7px 8px;border-bottom:1.5px solid var(--border);font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;background:#f8f7f4;text-align:left}
.tbl td{padding:9px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl-tot td{font-weight:700;border-top:2px solid var(--border);border-bottom:none;padding-top:10px}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11.5px;font-weight:600}

/* RUBRO BARS */
.rbar{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.rbar:last-child{border-bottom:none}
.rbar-name{flex:1;font-size:13px;font-weight:500}
.rbar-track{flex:2;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.rbar-fill{height:100%;border-radius:3px}
.rbar-pct{font-size:11.5px;color:var(--t2);min-width:28px;text-align:right}
.rbar-amt{font-size:13px;font-weight:700;min-width:75px;text-align:right}

/* METRICS */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.met{background:#f8f7f4;border-radius:8px;padding:11px 13px}
.met-lbl{font-size:11px;color:var(--t2);margin-bottom:3px}
.met-val{font-size:19px;font-weight:700}

/* KANBAN */
.kanban-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.kanban{display:grid;grid-template-columns:repeat(4,210px);gap:8px;padding:2px}
.k-col{background:#f8f7f4;border-radius:10px;padding:8px;min-height:100px}
.k-col-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.k-col-ttl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase}
.k-count{font-size:11px;font-weight:700;background:#fff;border-radius:20px;padding:1px 7px;color:var(--t2);border:1px solid var(--border)}
.k-card{background:#fff;border-radius:8px;padding:10px 11px;margin-bottom:6px;cursor:pointer;border:1.5px solid var(--border);border-left:3px solid transparent;transition:border-color .13s}
.k-card:active{background:#f8f7f4}
.k-card-ttl{font-size:13.5px;font-weight:600;line-height:1.3;margin-bottom:5px}
.k-card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.k-vence{font-size:11.5px;margin-top:4px}
.k-vence.venc{color:var(--red);font-weight:600}
.k-vence.hoy{color:var(--amber);font-weight:600}
.k-btn-add{width:100%;padding:8px;border:1.5px dashed var(--border2);border-radius:8px;background:none;color:var(--t3);font-size:13px;cursor:pointer;margin-top:4px}
.kanban-semana{display:grid;grid-template-columns:repeat(7,185px);gap:8px;padding:2px}
.k-today{border:1.5px solid rgba(124,58,237,.4)!important;background:rgba(124,58,237,.04)!important}
.k-fin{opacity:.8;border-color:rgba(26,158,114,.3)!important;border-left-color:#1a9e72!important;background:rgba(26,158,114,.04)}
.k-fin .k-card-ttl{text-decoration:line-through;color:var(--t3)}
.k-done-overlay{display:flex;align-items:center;justify-content:center;gap:4px;background:rgba(26,158,114,.12);border-radius:5px;padding:3px 6px;margin-top:5px;font-size:10.5px;font-weight:700;color:#1a9e72}
.k-mes-cell{min-height:76px;background:#f8f7f4;border:1.5px solid var(--border);border-radius:7px;padding:4px;overflow:hidden;cursor:default}
.k-mes-cell.hoy{background:rgba(124,58,237,.05);border-color:rgba(124,58,237,.4)!important}
.k-mes-mini{border-left:2px solid transparent;border-radius:3px;padding:2px 4px;margin-bottom:2px;font-size:10px;cursor:pointer;line-height:1.3;display:block;width:100%;text-align:left;background:#fff;border:1px solid var(--border)}
.k-mes-mini.done{background:rgba(26,158,114,.08);border-left-color:#1a9e72!important}
.k-stat-btns{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.k-stat-btn{flex:1;padding:3px 0;border-radius:4px;border:1.5px solid;font-size:9px;font-weight:700;cursor:pointer;background:none;min-width:22px;line-height:1.2}
.k-stat-btn.on{color:#fff!important}
.k-prog-bar{height:4px;background:rgba(0,0,0,.08);border-radius:2px;overflow:hidden;margin:4px 0}
.k-prog-fill{height:100%;border-radius:2px;background:#7c3aed}
.tipo-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-bottom:4px}

/* NOTAS */
.nota-item{background:#fffdf0;border:1px solid #e8e3c8;border-radius:10px;padding:12px 13px;margin-bottom:8px;position:relative;cursor:pointer}
.nota-item-txt{font-size:14px;line-height:1.5;color:var(--t1);white-space:pre-wrap;word-break:break-word}
.nota-item-fecha{font-size:11.5px;color:var(--t3);margin-top:6px}
.nota-del{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
.nota-del:hover{color:var(--red);background:var(--red-bg)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:300;align-items:flex-end;justify-content:center}
.modal-overlay.on{display:flex}
.modal-box{background:#fff;border-radius:18px 18px 0 0;padding:18px 16px calc(18px + var(--safe-b));width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px}
.modal-ttl{font-size:17px;font-weight:700;margin-bottom:12px}
.status-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.status-btn{padding:7px 8px;border-radius:8px;border:1.5px solid var(--border);font-size:12.5px;font-weight:600;cursor:pointer;background:#fff;color:var(--t2);flex:1;text-align:center;transition:all .13s}

/* GLOBAL */
.global-card{border-radius:12px;padding:14px;margin-bottom:10px;border:1.5px solid transparent;cursor:pointer}
.global-card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}

/* EMPTY */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--t3);font-size:14px}

/* FROW */
.frow{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.frow select{width:auto;min-width:100px}
</style>
</head>
<body>
<div id="login-screen" style="display:none;position:fixed;inset:0;background:#1a1916;z-index:9999;align-items:center;justify-content:center;flex-direction:column;padding:24px">
  <div style="width:100%;max-width:340px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:36px;margin-bottom:8px">&#128241;</div>
      <div style="font-size:22px;font-weight:700;color:#fff;margin-bottom:4px">Mi Sistema</div>
      <div style="font-size:13px;color:rgba(255,255,255,.45)">Ingresá para continuar</div>
    </div>
    <div style="margin-bottom:14px">
      <label style="display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,.6);margin-bottom:5px">Email</label>
      <input id="l-email" type="email" placeholder="tu@email.com" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:15px;padding:11px 13px;border-radius:9px;width:100%;box-sizing:border-box;outline:none" onkeydown="if(event.key==='Enter')document.getElementById('l-pass').focus()">
    </div>
    <div style="margin-bottom:8px">
      <label style="display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,.6);margin-bottom:5px">Contraseña</label>
      <input id="l-pass" type="password" placeholder="••••••••" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:15px;padding:11px 13px;border-radius:9px;width:100%;box-sizing:border-box;outline:none" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div id="l-err" style="color:#e24b4a;font-size:13px;margin-bottom:10px;text-align:center;min-height:18px"></div>
    <button id="l-btn" onclick="doLogin()" style="width:100%;padding:13px;background:#7c3aed;border:none;border-radius:9px;color:#fff;font-size:15px;font-weight:700;cursor:pointer">Entrar</button>
  </div>
</div>
<div id="rubros-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:8000;align-items:center;justify-content:center;padding:16px">
  <div style="background:#1a1916;border-radius:16px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto;padding:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-weight:700;color:#fff;font-size:16px">Rubros de gastos</div>
      <button onclick="closeRubrosModal()" style="background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:6px 10px;color:#fff;cursor:pointer">✕</button>
    </div>
    <div id="rubros-list"></div>
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.1)">
      <div style="font-size:12px;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:8px">NUEVO RUBRO</div>
      <input id="r-nombre" type="text" placeholder="Nombre del rubro" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:14px;padding:9px 11px;border-radius:8px;outline:none;margin-bottom:10px">
      <div id="paleta-rubros" style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px"></div>
      <button onclick="agregarRubro()" style="width:100%;padding:10px;background:#7c3aed;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer">➕ Agregar</button>
    </div>
  </div>
</div>
<div id="cal-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:8500;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto">
  <div style="background:#1a1916;border-radius:16px;width:100%;max-width:520px;padding:20px;margin:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <button onclick="calPrev()" style="background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:7px 13px;color:#fff;font-size:16px;cursor:pointer">‹</button>
      <div id="cal-titulo" style="font-weight:700;color:#fff;font-size:16px"></div>
      <button onclick="calNext()" style="background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:7px 13px;color:#fff;font-size:16px;cursor:pointer">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">
      <div style="text-align:center;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);padding:4px 0">L</div>
      <div style="text-align:center;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);padding:4px 0">M</div>
      <div style="text-align:center;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);padding:4px 0">X</div>
      <div style="text-align:center;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);padding:4px 0">J</div>
      <div style="text-align:center;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);padding:4px 0">V</div>
      <div style="text-align:center;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);padding:4px 0">S</div>
      <div style="text-align:center;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);padding:4px 0">D</div>
    </div>
    <div id="cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px"></div>
    <div id="cal-detalle" style="margin-top:14px"></div>
    <button onclick="closeCalendario()" style="margin-top:14px;width:100%;padding:10px;background:rgba(255,255,255,.08);border:none;border-radius:8px;color:rgba(255,255,255,.7);font-size:14px;cursor:pointer">Cerrar</button>
  </div>
</div>
<div class="app">
  <div class="top-bar">
    <div class="top-row">
      <div><div class="app-name">📱 Mi Sistema</div><div class="top-date" id="top-date"></div></div>
      <div style="display:flex;gap:6px"><button onclick="syncManual()" id="sync-btn" title="Sincronizar" style="background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:6px 10px;color:rgba(255,255,255,.65);font-size:12px;font-weight:600;cursor:pointer">☁️</button><button onclick="goSpace('global')" style="background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:6px 10px;color:rgba(255,255,255,.65);font-size:12px;font-weight:600;cursor:pointer">🌐 Global</button><button onclick="irATareas()" style="background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:6px 10px;color:rgba(255,255,255,.65);font-size:12px;font-weight:600;cursor:pointer">📋 Tareas</button><button onclick="openCalendario()" title="Calendario" style="background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:6px 10px;color:rgba(255,255,255,.65);font-size:12px;font-weight:600;cursor:pointer">📅</button><button onclick="doLogout()" title="Cerrar sesión" style="background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:6px 10px;color:rgba(255,255,255,.65);font-size:12px;font-weight:600;cursor:pointer">⏏️</button></div>
    </div>
    <div class="space-tabs" id="space-tabs"></div>
  </div>
  <div class="mod-bar" id="mod-bar"></div>
  <div class="astrip-wrap" id="alert-strip"></div>
  <div class="scroll-area" id="content"></div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// SUPABASE AUTH + SYNC
// ═══════════════════════════════════════════════════════
const SUPABASE_URL='https://jnhilhripjvpakmhzytb.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpuaGlsaHJpcGp2cGFrbWh6eXRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NjYwOTksImV4cCI6MjA5NzI0MjA5OX0.2GaPutKKL2sNHWLTdEQEQm0G-6E2fZJxX10Zz143-so';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let sbUser=null,isOnline=navigator.onLine;
let userRole='admin';    // 'admin' | 'member'
let teamMembers=[];      // [{member_id, member_name}]
let kanbanMode='estado'; // 'estado' | 'semana'
let _kanbanWeek=0;
let _kanbanMesOffset=0;
let showFinaliz=true;
window.addEventListener('online',()=>{isOnline=true;flushQueue();updateSyncBtn();});
window.addEventListener('offline',()=>{isOnline=false;updateSyncBtn();});
function updateSyncBtn(){const b=document.getElementById('sync-btn');if(b)b.textContent=isOnline?'☁️':'📴';}
async function initAuth(){
  try{
    const{data}=await sb.auth.getSession();
    if(data.session?.user){sbUser=data.session.user;await detectRole();hideLogin();await pullFromSupabase();}
    else{showLogin();return;}
  }catch(e){showLogin();return;}
  appInit();
}
function showLogin(){const e=document.getElementById('login-screen');if(e)e.style.display='flex';}
function hideLogin(){const e=document.getElementById('login-screen');if(e)e.style.display='none';}
async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  const btn=document.getElementById('l-btn');const err=document.getElementById('l-err');
  btn.disabled=true;btn.textContent='Entrando...';err.textContent='';
  try{
    const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){err.textContent='Email o contraseña incorrectos';btn.disabled=false;btn.textContent='Entrar';return;}
    sbUser=data.user;await detectRole();hideLogin();await pullFromSupabase();appInit();
  }catch(e){err.textContent='Error de conexión';btn.disabled=false;btn.textContent='Entrar';}

async function doLogout(){await sb.auth.signOut();sbUser=null;showLogin();}

function sbTombstone(id,table){if(sbUser&&isOnline){sb.from('tombstones').upsert({id,user_id:sbUser.id,table_name:table,deleted_at:new Date().toISOString()}).then(()=>{}).catch(()=>{});}}
async function pullFromSupabase(){
  if(!sbUser||!isOnline)return;
  try{
    const uid=sbUser.id;
    const SIDS=['pers','sant','covi','tork'];
    const[{data:g},{data:v},{data:t},{data:n},{data:tb}]=await Promise.all([
      sb.from('gastos').select('*').eq('user_id',uid),
      sb.from('vencimientos').select('*').eq('user_id',uid),
      (()=>{
        if(userRole==='member')return sb.from('tareas').select('*').or('user_id.eq.'+uid+',assigned_to.eq.'+uid);
        const mids=teamMembers.map(m=>m.member_id);
        return mids.length?sb.from('tareas').select('*').in('user_id',[uid,...mids]):sb.from('tareas').select('*').eq('user_id',uid);
      })(),
      sb.from('notas').select('*').eq('user_id',uid),
      sb.from('tombstones').select('*').eq('user_id',uid),
    ]);
    const tombs=Object.fromEntries((tb||[]).map(x=>[x.id,new Date(x.deleted_at).getTime()]));
    function rts(x){return x&&x.updated_at?new Date(x.updated_at).getTime():0;}
    function mergeTable(localArr,sbArr,toLocal,toRemote,lsKey,table){
      const loc=localArr.map(x=>({...x,id:x.id||table[0]+'_'+uid()}));
      const sbMap=Object.fromEntries(sbArr.map(x=>[x.id,x]));
      const locMap=Object.fromEntries(loc.map(x=>[x.id,x]));
      const merged=[];
      for(const item of loc){
        const remote=sbMap[item.id];
        const localTs=item._ts||0;
        const remoteTs=rts(remote);
        if(!remote){
          if(tombs[item.id]&&tombs[item.id]>localTs){
            // Another device deleted it after our last local modification
          }else{
            sbUpsert(table,toRemote(item,uid));
            merged.push(item);
          }
        }else if(localTs>remoteTs){
          sbUpsert(table,toRemote(item,uid));
          merged.push(item);
        }else{
          merged.push({...toLocal(remote),_ts:remoteTs});
        }
      }
      for(const remote of sbArr){
        if(!locMap[remote.id]){
          const remoteTs=rts(remote);
          if(tombs[remote.id]&&tombs[remote.id]>=remoteTs){
            sbDel(table,remote.id);
          }else{
            merged.push({...toLocal(remote),_ts:remoteTs});
          }
        }
      }
      lsSave(lsKey,merged);
    }
    mergeTable(
      lsLoad('ms2_pers_gastos'),g||[],
      r=>({id:r.id,fecha:r.fecha,importe:r.importe,rubro:r.rubro,desc:r.descripcion||'',empresa:r.empresa||'pers'}),
      (x,u)=>({id:x.id,user_id:u,fecha:x.fecha,importe:x.importe,rubro:x.rubro,descripcion:x.desc||'',empresa:x.empresa||'pers',updated_at:new Date(x._ts||Date.now()).toISOString()}),
      'ms2_pers_gastos','gastos'
    );
    SIDS.forEach(sp=>{
      mergeTable(
        lsLoad('ms2_'+sp+'_vencs'),(v||[]).filter(x=>x.espacio===sp),
        r=>({id:r.id,nombre:r.nombre,cat:r.cat||'',fecha:r.fecha,importe:r.importe,repetir:r.repetir||0,alerta:r.alerta||7,nota:r.nota||'',pagado:r.pagado||false}),
        (x,u)=>({id:x.id,user_id:u,espacio:sp,nombre:x.nombre,cat:x.cat||'',fecha:x.fecha,importe:x.importe||null,repetir:parseInt(x.repetir)||0,alerta:parseInt(x.alerta)||7,nota:x.nota||'',pagado:x.pagado||false,updated_at:new Date(x._ts||Date.now()).toISOString()}),
        'ms2_'+sp+'_vencs','vencimientos'
      );
    });
    mergeTable(
      lsLoad('ms2_tareas'),t||[],
      r=>({id:r.id,titulo:r.titulo,space:r.espacio,estado:r.estado||'Sin hacer',prio:r.prio||'Media',fecha:r.fecha||'',desc:r.descripcion||'',creada:r.creada||'',user_id:r.user_id,assigned_to:r.assigned_to||null,tipo:r.tipo||'normal',duracion_min:r.duracion_min||null,recur:r.recur||null,recur_completado:r.recur_completado||null,horas_total:r.horas_total||null,horas_dia:r.horas_dia||null,horas_log:r.horas_log||[],fecha_inicio:r.fecha_inicio||null,fecha_fin:r.fecha_fin||null,recur_log:r.recur_log||[],orden:r.orden??null}),
      (x,u)=>({id:x.id,user_id:x.user_id||u,espacio:x.space,titulo:x.titulo,estado:x.estado||'Sin hacer',prio:x.prio||'Media',fecha:x.fecha||null,descripcion:x.desc||'',creada:x.creada,assigned_to:x.assigned_to||null,tipo:x.tipo||'normal',duracion_min:x.duracion_min||null,recur:x.recur||null,recur_completado:x.recur_completado||null,horas_total:x.horas_total||null,horas_dia:x.horas_dia||null,horas_log:x.horas_log||[],fecha_inicio:x.fecha_inicio||null,fecha_fin:x.fecha_fin||null,recur_log:x.recur_log||[],orden:x.orden??null,updated_at:new Date(x._ts||Date.now()).toISOString()}),
      'ms2_tareas','tareas'
    );
    SIDS.forEach(sp=>{
      mergeTable(
        lsLoad('ms2_'+sp+'_notas'),(n||[]).filter(x=>x.espacio===sp),
        r=>({id:r.id,texto:r.texto,fecha:r.fecha}),
        (x,u)=>({id:x.id,user_id:u,espacio:sp,texto:x.texto,fecha:x.fecha,updated_at:new Date(x._ts||Date.now()).toISOString()}),
        'ms2_'+sp+'_notas','notas'
      );
    });
    await flushQueue();
  }catch(e){console.warn('pull error',e);}
}

async function sbUpsert(table,row){if(!sbUser)return;if(!isOnline){addToQueue('upsert',table,row);return;}try{await sb.from(table).upsert(row);}catch(e){addToQueue('upsert',table,row);}}
async function sbDel(table,id){if(!sbUser)return;if(!isOnline){addToQueue('delete',table,{id});return;}try{await sb.from(table).delete().eq('id',id);}catch(e){addToQueue('delete',table,{id});}}
function addToQueue(op,table,payload){const q=lsLoad('ms2_sync_queue');q.push({op,table,payload,ts:Date.now()});lsSave('ms2_sync_queue',q);}
async function flushQueue(){if(!sbUser||!isOnline)return;const q=lsLoad('ms2_sync_queue');if(!q.length)return;const r=[];for(const i of q){try{if(i.op==='upsert')await sb.from(i.table).upsert(i.payload);else await sb.from(i.table).delete().eq('id',i.payload.id);}catch(e){r.push(i);}}lsSave('ms2_sync_queue',r);if(!r.length&&q.length)toast('✅ Sincronizado','green');}
async function syncManual(silent=false){if(!sbUser){if(!silent)showLogin();return;}const b=document.getElementById('sync-btn');if(b)b.textContent='⏳';await pullFromSupabase();renderContent();renderAlerts();if(b)b.textContent=isOnline?'☁️':'📴';if(!silent)toast('✅ Sincronizado','green');}

let _calY=new Date().getFullYear(),_calM=new Date().getMonth(),_calSel=null;
const MESES_ES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function openCalendario(){_calY=new Date().getFullYear();_calM=new Date().getMonth();_calSel=isoHoy();document.getElementById('cal-modal').style.display='flex';renderCal();}
function closeCalendario(){document.getElementById('cal-modal').style.display='none';}
function calPrev(){if(_calM===0){_calM=11;_calY--;}else _calM--;_calSel=null;renderCal();}
function calNext(){if(_calM===11){_calM=0;_calY++;}else _calM++;_calSel=null;renderCal();}
function getCalEventos(){
  const ev={};
  function add(fecha,label,color,sp,id,type){if(!fecha)return;if(!ev[fecha])ev[fecha]=[];ev[fecha].push({label,color,sp,id:id||'',type:type||''});}
  SPACES.forEach(sp=>{getData(sp.id,'vencs').forEach(v=>{if(!v.fecha||v.pagado)return;const d=diasHasta(v.fecha);add(v.fecha,'📋 '+v.nombre,d<0?'#e24b4a':d<=3?'#f59e0b':'#7c3aed',sp.name,v.id,'venc');});});
  getTareas().filter(t=>t.fecha&&t.estado!=='Finalizado').forEach(t=>{const d=diasHasta(t.fecha);const sp=SMAP[t.space]||SPACES[0];add(t.fecha,'✅ '+t.titulo,d<0?'#e24b4a':d<=1?'#f59e0b':'#2878d4',sp.name,t.id,'tarea');});
  return ev;
}
function renderCal(){
  document.getElementById('cal-titulo').textContent=MESES_ES[_calM]+' '+_calY;
  const hoy=isoHoy(),ev=getCalEventos();
  const primer=new Date(_calY,_calM,1),ultimo=new Date(_calY,_calM+1,0);
  const startDow=(primer.getDay()+6)%7;
  const filas=Math.ceil((startDow+ultimo.getDate())/7);
  let html='';
  for(let i=0;i<filas*7;i++){
    const dn=i-startDow+1;
    if(dn<1||dn>ultimo.getDate()){html+='<div></div>';continue;}
    const iso=_calY+'-'+String(_calM+1).padStart(2,'0')+'-'+String(dn).padStart(2,'0');
    const evs=ev[iso]||[];const isHoy=iso===hoy;const isSel=iso===_calSel;
    const bg=isSel?'rgba(124,58,237,.4)':isHoy?'rgba(124,58,237,.15)':'rgba(255,255,255,.04)';
    const border=isSel?'1.5px solid #7c3aed':isHoy?'1.5px solid rgba(124,58,237,.5)':'1.5px solid transparent';
    const dots=evs.length?'<div style="display:flex;gap:2px;justify-content:center;margin-top:2px">'+[...new Set(evs.map(e=>e.color))].slice(0,3).map(col=>'<div style="width:5px;height:5px;border-radius:50%;background:'+col+'"></div>').join('')+'</div>':'';
    html+=`<div onclick="calSelDay('${iso}')" style="background:${bg};border:${border};border-radius:8px;padding:5px 2px;text-align:center;cursor:pointer;min-height:42px"><div style="font-size:12px;font-weight:${isHoy?700:400};color:${isHoy?'#a78bfa':'rgba(255,255,255,.8)'}">${dn}</div>${dots}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
  if(_calSel)renderCalDetalle(_calSel,ev);else document.getElementById('cal-detalle').innerHTML='';
}
function calSelDay(iso){_calSel=iso;renderCal();}
function calAbrirEvento(type,id){
  if(!id)return;
  closeCalendario();
  if(type==='tarea'){setTimeout(()=>abrirTarea(id),200);}
  else if(type==='venc'){
    for(const sp of SPACES){const v=getData(sp.id,'vencs').find(x=>x.id===id);if(v){curSpace=sp.id;goSpace(sp.id);break;}}
  }
}

  },200);

function resetRecurringTasks(){
  const today=isoHoy();
  const arr=getTareas();
  let changed=false;
  arr.forEach(t=>{
    if(t.tipo==='recurring'&&t.estado==='Finalizado'&&t.recur_completado!==today){
      t.estado='Sin hacer';t._ts=Date.now();changed=true;

function logHorasTarea(id,horas){
  const arr=getTareas();const t=arr.find(x=>x.id===id);if(!t)return;
  if(!t.horas_log)t.horas_log=[];
  const today=isoHoy();
  const h=parseFloat(horas)||t.horas_dia||1;
  const entry=t.horas_log.find(l=>l.fecha===today);
  if(entry){entry.horas=(entry.horas||0)+h;}
  else{t.horas_log.push({fecha:today,horas:h});}
  const total=t.horas_log.reduce((s,l)=>s+(l.horas||0),0);
  t._ts=Date.now();
  if(total>=(t.horas_total||99999)){
    t.estado='Finalizado';
    toast('🎉 ¡Capacitación completada! '+total+'h en total','green');
  }else{
    toast('⏱ +'+h+'h registrada — '+total+'/'+(t.horas_total||'?')+'h','green');
  }
  setTareas(arr);closeModal();if(curMod==='tareas')renderContent();renderAlerts();
}

function getWeekDays(offset){
  const today=new Date();
  const dow=(today.getDay()+6)%7;
  const mon=new Date(today);mon.setDate(today.getDate()-dow+(offset*7));
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d.toISOString().split('T')[0];});
}

// ── getLastMissedDate: returns the most recent past date a task was scheduled but not done
function getLastMissedDate(t){
  const today=isoHoy();
  const d=new Date(today+'T12:00:00');
  for(let i=0;i<93;i++){
    d.setDate(d.getDate()-1);
    const iso=d.toISOString().split('T')[0];
    if(recurMatchesDate(t,iso)){
      return isDoneOnDate(t,iso)?null:iso;
    }
  }
  return null;
}

// ── recurMatchesDate: checks if recurring/timed task appears on a given date
function recurMatchesDate(t,d){
  const start=t.fecha_inicio||t.fecha;
  const end=t.fecha_fin||null;
  if(!start||d<start)return false;
  if(end&&d>end)return false;
  const dow=iso=>(new Date(iso+'T12:00:00').getDay()+6)%7;
  const diffDays=Math.round((new Date(d+'T12:00:00')-new Date(start+'T12:00:00'))/86400000);
  if(t.recur==='weekdays')return dow(d)<5;
  if(t.recur==='weekly')return dow(d)===dow(start);
  if(t.recur==='biweekly')return diffDays>=0&&diffDays%14===0;
  if(t.recur==='monthly')return d.split('-')[2]===start.split('-')[2];
  return true; // 'daily' or null
}

function renderKanbanSemana(tareas,filter){
  const PRIO_O={Alta:0,Media:1,Baja:2};
  const DIAS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const days=getWeekDays(_kanbanWeek);
  const today=isoHoy();
  const byDay={};
  const noDat=[];
  days.forEach(d=>{byDay[d]=[];});

  let cards=[...tareas];
  if(!showFinaliz)cards=cards.filter(t=>t.estado!=='Finalizado'&&!(t.tipo==='recurring'&&isDoneOnDate(t,today)));
  if(filter!=='all'&&filter!=='member')cards=cards.filter(t=>!teamMembers.some(m=>m.member_id===t.user_id));
  if(filter&&filter!=='all'&&filter!=='member'&&filter!=='own')cards=cards.filter(t=>t.space===filter);
  if(filter==='member')cards=cards.filter(t=>teamMembers.some(m=>m.member_id===t.assigned_to||m.member_id===t.user_id));

  const esHabil=iso=>{const dow=(new Date(iso+'T12:00:00').getDay()+6)%7;return dow<5;};
  cards.forEach(t=>{
    if(!t.tipo||t.tipo==='normal'){
      if(t.fecha&&byDay[t.fecha]!==undefined){byDay[t.fecha].push({task:t,fecha:t.fecha});}
      else if(t.fecha&&t.fecha<days[0]){byDay[days[0]].push({task:t,fecha:days[0]});}
      else if(!t.fecha){noDat.push({task:t,fecha:null});}
    }else{
      // recurring/timed: show on each day in range (null fecha_fin = sin límite)
      days.forEach(d=>{
        if(recurMatchesDate(t,d))byDay[d].push({task:t,fecha:d});
      });
    }
  });
  Object.keys(byDay).forEach(d=>{
    byDay[d].sort((a,b)=>{
      const oa=a.task.orden??9999999999999,ob=b.task.orden??9999999999999;
      if(oa!==ob)return oa-ob;
      return (PRIO_O[a.task.prio]||1)-(PRIO_O[b.task.prio]||1);
    });
  });

  // ── overdue: add missed recurring/timed tasks to today's column
  if(byDay[today]!==undefined){
    const alreadyToday=new Set(byDay[today].filter(i=>!i.overdue).map(i=>i.task.id));
    cards.filter(t=>t.tipo==='recurring'||t.tipo==='timed').forEach(t=>{
      if(alreadyToday.has(t.id))return;
      const missed=getLastMissedDate(t);
      if(missed)byDay[today].push({task:t,fecha:today,overdue:missed});
    });
    // re-sort today after adding overdue cards (overdue go to bottom)
    byDay[today].sort((a,b)=>{
      if(!!a.overdue!==!!b.overdue)return a.overdue?1:-1;
      const oa=a.task.orden??9999999999999,ob=b.task.orden??9999999999999;
      if(oa!==ob)return oa-ob;
      return (PRIO_O[a.task.prio]||1)-(PRIO_O[b.task.prio]||1);
    });
  }

  const navStyle='padding:6px 12px;border-radius:8px;border:1.5px solid var(--border2);background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--t1)';
  const wkLabel=days[0]+' → '+days[6];

  return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
    <button onclick="_kanbanWeek--;renderContent()" style="${navStyle}">‹ Anterior</button>
    <span style="font-size:13px;font-weight:700;flex:1;text-align:center">${wkLabel}</span>
    <button onclick="_kanbanWeek++;renderContent()" style="${navStyle}">Siguiente ›</button>
  </div>
  <div class="kanban-scroll"><div class="kanban-semana">
    ${days.map((iso,i)=>{
      const isToday=iso===today;
      const dn=parseInt(iso.split('-')[2]);

      const dc=byDay[iso]||[];

// ── reordenarDia ─────────────────────────────────────────────────────────────
function reordenarDia(id,fecha,dir){
  const all=getTareas();
  // collect tasks visible on this date
  const snap=[];
  all.forEach(t=>{
    if(!t.tipo||t.tipo==='normal'){
      if(t.fecha===fecha)snap.push(t);
    } else {
      if(recurMatchesDate(t,fecha))snap.push(t);
    }
  });
  if(snap.length<2)return;
  // initialize orden if missing
  snap.forEach((t,i)=>{if(t.orden==null)t.orden=i*10;});
  snap.sort((a,b)=>a.orden-b.orden);
  const pos=snap.findIndex(t=>t.id===id);
  const npos=pos+(dir==='up'?-1:1);
  if(npos<0||npos>=snap.length)return;
  // swap orden
  const tmp=snap[pos].orden;
  snap[pos].orden=snap[npos].orden;
  snap[npos].orden=tmp;
  snap[pos]._ts=snap[npos]._ts=Date.now();
  setTareas(all);
  if(curMod==='tareas')renderContent();
}

// ── isDoneOnDate helper ────────────────────────────────────────────────────────
function isDoneOnDate(t,fecha){
  if(!t.tipo||t.tipo==='normal')return t.estado==='Finalizado';
  if(t.tipo==='recurring')return(t.recur_log||[]).some(l=>l.fecha===fecha&&l.completado);
  if(t.tipo==='timed'){
    const h=((t.horas_log||[]).find(l=>l.fecha===fecha)||{}).horas||0;
    return h>=(t.horas_dia||1);
  }
  return false;
}

// ── deshacerHorasDia ───────────────────────────────────────────────────────────
function deshacerHorasDia(id,fecha){
  const arr=getTareas();const t=arr.find(x=>x.id===id);if(!t)return;
  t.horas_log=(t.horas_log||[]).filter(l=>l.fecha!==fecha);
  t._ts=Date.now();
  setTareas(arr);
  if(curMod==='tareas')renderContent();renderAlerts();
  toast('↩ Horas del '+fecha+' removidas','amber');
}

// ── marcarDiaRecurrente ────────────────────────────────────────────────────────
function marcarDiaRecurrente(id,fecha,done=true){
  const arr=getTareas();const t=arr.find(x=>x.id===id);if(!t)return;
  if(!t.recur_log)t.recur_log=[];
  const entry=t.recur_log.find(l=>l.fecha===fecha);
  if(entry){entry.completado=done;}
  else if(done){t.recur_log.push({fecha,completado:true});}
  t._ts=Date.now();
  setTareas(arr);
  if(curMod==='tareas')renderContent();renderAlerts();
  toast(done?'✅ ¡Hecho por hoy! Vuelve mañana 🔄':'↩ Marcada como pendiente','green');
}

// ── logHorasDiaEsp ─────────────────────────────────────────────────────────────
function logHorasDiaEsp(id,fecha,horas){
  const arr=getTareas();const t=arr.find(x=>x.id===id);if(!t)return;
  if(!t.horas_log)t.horas_log=[];
  const h=parseFloat(horas)||t.horas_dia||1;
  const entry=t.horas_log.find(l=>l.fecha===fecha);
  if(entry){entry.horas=(entry.horas||0)+h;}
  else{t.horas_log.push({fecha,horas:h});}
  const total=t.horas_log.reduce((s,l)=>s+(l.horas||0),0);
  t._ts=Date.now();
  if(total>=(t.horas_total||99999)){t.estado='Finalizado';toast('🎉 ¡Completado! '+total+'h en total','green');}
  else{toast('⏱ +'+h+'h registrada ('+fecha+') — '+total+'/'+(t.horas_total||'?')+'h total','green');}
  setTareas(arr);
  if(curMod==='tareas')renderContent();renderAlerts();
}

// ── renderKanbanMes ────────────────────────────────────────────────────────────
function renderKanbanMes(tareas,filter){
  const PRIO_O={Alta:0,Media:1,Baja:2};
  const DIAS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const now=new Date();
  const base=new Date(now.getFullYear(),now.getMonth()+_kanbanMesOffset,1);
  const yr=base.getFullYear(),mo=base.getMonth();
  const firstDay=new Date(yr,mo,1),lastDay=new Date(yr,mo+1,0);
  const startDow=(firstDay.getDay()+6)%7;
  const daysInMonth=lastDay.getDate();
  const today=isoHoy();
  const allDays=[];
  for(let d=1;d<=daysInMonth;d++)allDays.push(yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'));

  const byDay={};
  allDays.forEach(d=>{byDay[d]=[];});
  let cards=[...tareas];
  if(!showFinaliz)cards=cards.filter(t=>t.estado!=='Finalizado');
  if(filter!=='all'&&filter!=='member')cards=cards.filter(t=>!teamMembers.some(m=>m.member_id===t.user_id));
  if(filter&&filter!=='all'&&filter!=='member'&&filter!=='own')cards=cards.filter(t=>t.space===filter);
  if(filter==='member')cards=cards.filter(t=>teamMembers.some(m=>m.member_id===t.assigned_to||m.member_id===t.user_id));

  cards.forEach(t=>{
    if(!t.tipo||t.tipo==='normal'){
      if(t.fecha&&byDay[t.fecha]!==undefined)byDay[t.fecha].push({task:t,fecha:t.fecha});
    }else{
      allDays.forEach(d=>{
        if(recurMatchesDate(t,d))byDay[d].push({task:t,fecha:d});
      });
    }
  });
  allDays.forEach(d=>{
    byDay[d].sort((a,b)=>{
      const oa=a.task.orden??9999999999999,ob=b.task.orden??9999999999999;
      if(oa!==ob)return oa-ob;
      return (PRIO_O[a.task.prio]||1)-(PRIO_O[b.task.prio]||1);
    });
  });

  const navStyle='padding:6px 12px;border-radius:8px;border:1.5px solid var(--border2);background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--t1)';
  let cells='';
  for(let i=0;i<startDow;i++)cells+='<div></div>';
  allDays.forEach(iso=>{
    const dn=parseInt(iso.split('-')[2]);
    const isToday=iso===today;
    const dc=byDay[iso]||[];
    const vis=dc.slice(0,3);const extra=dc.length-vis.length;
    cells+=`<div class="k-mes-cell${isToday?' hoy':''}">
      <div style="font-size:11px;font-weight:${isToday?700:500};color:${isToday?'#7c3aed':'var(--t2)'};margin-bottom:3px;display:flex;justify-content:space-between;align-items:center">
        <span>${dn}</span>${dc.length?`<span style="font-size:10px;color:var(--t3)">${dc.length}</span>`:''}
      </div>
      ${vis.map(item=>renderMesCard(item.task,item.fecha)).join('')}
      ${extra>0?`<div style="font-size:9px;color:var(--t3);margin-top:1px">+${extra} más</div>`:''}
      <button onclick="calNuevaTarea('${iso}')" style="width:100%;border:none;background:none;color:var(--t3);font-size:10px;cursor:pointer;padding:1px 0;text-align:center;margin-top:2px">＋</button>
    </div>`;
  });

  return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
    <button onclick="_kanbanMesOffset--;renderContent()" style="${navStyle}">‹</button>
    <span style="font-size:15px;font-weight:700;flex:1;text-align:center">${MESES[mo]} ${yr}</span>
    <button onclick="_kanbanMesOffset=0;renderContent()" style="padding:4px 10px;border-radius:8px;border:1.5px solid var(--border2);background:#fff;font-size:12px;cursor:pointer;color:var(--t2)">Hoy</button>
    <button onclick="_kanbanMesOffset++;renderContent()" style="${navStyle}">›</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">
    ${DIAS.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;padding:4px 0;letter-spacing:.05em">${d}</div>`).join('')}
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">
    ${cells}
  </div>`;
}

function renderMesCard(t,fecha){
  const pc=PRIO_C[t.prio]||'#888';
  const done=isDoneOnDate(t,fecha);
  const isFin=t.estado==='Finalizado';
  return`<div class="k-mes-mini${done||isFin?' done':''}" style="border-left-color:${done||isFin?'#1a9e72':pc};text-align:left;padding:2px 4px;margin-bottom:2px;border-radius:3px;cursor:pointer" onclick="event.stopPropagation();abrirTarea('${t.id}')">
    <span style="${done||isFin?'text-decoration:line-through;color:var(--t3)':'color:var(--t1)'}">${done||isFin?'✓ ':''}${esc(t.titulo.slice(0,16))}${t.titulo.length>16?'…':''}</span>
    ${done&&t.tipo==='recurring'?`<button onclick="event.stopPropagation();marcarDiaRecurrente('${t.id}','${fecha}',false)" style="border:none;background:none;color:#1a9e72;cursor:pointer;font-size:9px;padding:0;vertical-align:middle" title="Deshacer">↩</button>`:''}
    ${done&&t.tipo==='timed'?`<button onclick="event.stopPropagation();deshacerHorasDia('${t.id}','${fecha}')" style="border:none;background:none;color:#1a9e72;cursor:pointer;font-size:9px;padding:0;vertical-align:middle" title="Quitar horas">↩</button>`:''}
    ${t.tipo!=='normal'&&!done&&!isFin?`<span style="font-size:9px;color:#7c3aed"> ${t.tipo==='recurring'?'🔄':'⏱'}</span>`:''}
  </div>`;
}

function goSpace(id){

function goMod(id){

  if(t)t.classList.add('on');
  renderContent();

function renderContent(){
  const area=document.getElementById('content');
  if(isGlobal){renderGlobal();return;}
  if(curMod==='asistente') area.innerHTML=buildAsistente();
  else if(curMod==='gastos') area.innerHTML=buildGastos();
  else if(curMod==='vencimientos') area.innerHTML=buildVencs();
  else if(curMod==='tareas') area.innerHTML=buildTareas();
  else if(curMod==='resumen') area.innerHTML=buildResumen();
  else if(curMod==='notas') area.innerHTML=buildNotas();
}

function renderAlerts(){
  const strip=document.getElementById('alert-strip');
  const items=[];
  SPACES.forEach(sp=>{
    getData(sp.id,'vencs').forEach(v=>{
      if(v.pagado&&parseInt(v.repetir||0)===0)return;
      const d=diasHasta(v.fecha),u=parseInt(v.alerta||7);
      if(d<0) items.push({txt:`⚠️ [${sp.name}] ${v.nombre} vencido`,cls:'red',d});
      else if(d<=u) items.push({txt:`${d===0?'🔴 HOY':'🟡 '+d+'d'}: [${sp.name}] ${v.nombre}`,cls:d<=2?'red':'amber',d});
    });
  });
  getTareas().filter(t=>t.estado!=='Finalizado'&&t.fecha).forEach(t=>{
    const d=diasHasta(t.fecha),sp=SMAP[t.space]||SPACES[0];
    if(d<0) items.push({txt:`⚠️ Tarea vencida [${sp.name}]: ${t.titulo}`,cls:'red',d});
    else if(d<=1) items.push({txt:`🔴 Tarea urgente [${sp.name}]: ${t.titulo}`,cls:'red',d});
  });
  items.sort((a,b)=>a.d-b.d);
  if(!items.length){strip.innerHTML='';return;}
  strip.innerHTML=`<div class="astrip">${items.map(i=>`<div class="astrip-item ${i.cls}">${i.txt}</div>`).join('<span style="color:#ddd;padding:0 5px">·</span>')}</div>`;
}

function initSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  recognition=new SR();
  recognition.lang='es-AR';recognition.continuous=false;recognition.interimResults=true;
  recognition.onresult=e=>{
    let t='';for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;
    const el=document.getElementById('asist-in');if(el)el.value=t;
  };
  recognition.onend=()=>{
    grabando=false;
    const btn=document.getElementById('mic-btn');
    if(btn){btn.classList.remove('rec');btn.textContent='🎤';}
    const v=document.getElementById('asist-in');
    if(v&&v.value.trim())setTimeout(enviar,400);
  };
  recognition.onerror=()=>{grabando=false;const b=document.getElementById('mic-btn');if(b){b.classList.remove('rec');b.textContent='🎤';}};
}

function toggleMic(){
  if(!recognition){alert('Necesitás Chrome y https:// para usar el micrófono.');return;}
  if(grabando){recognition.stop();return;}
  grabando=true;
  const btn=document.getElementById('mic-btn');
  if(btn){btn.classList.add('rec');btn.textContent='⏹';}
  const el=document.getElementById('asist-in');
  if(el){el.value='';el.placeholder='Escuchando...';}
  recognition.start();
  setTimeout(()=>{if(grabando)recognition.stop();},15000);
}

async function enviar(){
  const el=document.getElementById('asist-in');
  const txt=el?el.value.trim():'';
  if(!txt)return;
  const btn=document.getElementById('asist-send');
  if(btn)btn.disabled=true;
  if(el)el.value='';
  addBubble(txt,'u');
  addBubble('Procesando...','think');
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,system:SYSTEM,
        messages:[{role:'user',content:`Fecha hoy: ${isoHoy()}\nGasto: ${txt}`}]})
    });
    const data=await r.json();
    removeThink();
    const raw=(data.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(raw);
    if(parsed.gastos?.length>0){
      addBubble(parsed.respuesta||'Revisá y confirmá:','ai');
      pendIA=parsed.gastos;
      showPropuesta(parsed.gastos);
    }else{
      addBubble(parsed.respuesta||'No entendí el gasto.','ai');
      pendIA=null;
    }
  }catch(e){
    removeThink();
    addBubble('Error. ¿Estás en https://?','err');
  }
  if(btn)btn.disabled=false;
}

function addBubble(txt,tipo){
  const id=tipo==='think'?' id="think-bub"':'';
  const cls=tipo==='u'?'bub bub-u':tipo==='err'?'bub bub-ai err':tipo==='think'?'bub bub-ai think':'bub bub-ai';
  chatHtml+=`<div class="${cls}"${id}>${esc(txt)}</div>`;
  const cz=document.getElementById('chat-zone');
  if(cz){cz.innerHTML=chatHtml;cz.scrollTop=cz.scrollHeight;}
}
function removeThink(){
  chatHtml=chatHtml.replace(/<div class="bub bub-ai think" id="think-bub">.*?<\/div>/,'');
  const cz=document.getElementById('chat-zone');if(cz)cz.innerHTML=chatHtml;
}
function showPropuesta(items){
  const pz=document.getElementById('propuesta-zone');if(!pz)return;
  const rmap=Object.fromEntries(RUBROS_PERS.map(r=>[r.id,r]));
  const total=items.reduce((s,g)=>s+g.importe,0);
  let h=`<div class="propuesta"><div style="font-size:11.5px;color:rgba(255,255,255,.5);margin-bottom:7px">Revisá antes de guardar:</div>`;
  items.forEach(g=>{
    const r=rmap[g.rubro]||{label:g.rubro,color:'#888',bg:'#eee'};
    h+=`<div class="prop-row">
      <div><span class="badge" style="background:${r.bg};color:${r.color}">${esc(r.label)}</span>${g.desc?`<span style="font-size:12px;color:rgba(255,255,255,.6);margin-left:5px">${esc(g.desc)}</span>`:''}</div>
      <div style="font-weight:700;color:#fff;white-space:nowrap">${fmtM(g.importe)}</div>
    </div>`;
  });
  if(items.length>1) h+=`<div style="display:flex;justify-content:space-between;padding-top:7px;border-top:1px solid rgba(255,255,255,.15);margin-top:4px"><span style="color:rgba(255,255,255,.7);font-weight:700;font-size:13px">Total</span><span style="color:#fff;font-weight:700">${fmtM(total)}</span></div>`;
  h+=`<button class="prop-confirm" onclick="confirmarIA()">✅ Confirmar y guardar</button></div>`;
  pz.innerHTML=h;
}
function confirmarIA(){
  if(!pendIA)return;
  const arr=getData('pers','gastos');
  pendIA.forEach(g=>arr.push({id:uid(),fecha:g.fecha,importe:g.importe,rubro:g.rubro,desc:g.desc||''}));
  setData('pers','gastos',arr);
  addBubble(`✅ ${pendIA.length>1?pendIA.length+' gastos guardados':'Gasto guardado'}. ¿Algo más?`,'ai');
  pendIA=null;
  const pz=document.getElementById('propuesta-zone');if(pz)pz.innerHTML='';
  renderAlerts();
}

  const arr=getData('pers','gastos');arr.push(ng);setData('pers','gastos',arr);
  sbUpsert('gastos',{id:ng.id,user_id:sbUser?.id,fecha,importe,rubro,descripcion:desc,empresa});

  document.getElementById('g-desc').value='';

      <td><button class="btn-xs" style="background:var(--red-bg);color:var(--red);border-color:var(--red)" onclick="delGasto('${g.id}')">✕</button></td>
    </tr>`;}).join('')}</tbody>
    <tfoot><tr class="tbl-tot"><td colspan="4">Total</td><td style="text-align:right">${fmtM(total)}</td><td></td></tr></tfoot>
  </table></div>`;
}

function delGasto(id){
  setData('pers','gastos',getData('pers','gastos').filter(g=>g.id!==id));

}

function buildVencs(){

  const vencs=getData(curSpace,'vencs');
  const ord=[...vencs].sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const cats=curSpace==='pers'
    ?['Cuotas auto','Servicios','Seguro','Impuestos / ABL','Obra social','Tarjeta','Préstamo','Alquiler','Suscripciones','Otros']
    :['Impuestos','Sueldos','Proveedor','Alquiler','Servicios','Tarjeta/Cuota','Préstamo','Otros'];
  return`<div class="card">
    <div class="card-ttl">Nuevo vencimiento — ${sp.emoji} ${esc(sp.name)}</div>
    <div class="fg fg2">
      <div><label class="lbl">Concepto</label><input type="text" id="v-nom" placeholder="OSDE, AFIP, alquiler..."></div>
      <div><label class="lbl">Categoría</label><select id="v-cat">${cats.map(o=>`<option>${o}</option>`).join('')}</select></div>
    </div>
    <div class="fg fg3">
      <div><label class="lbl">Fecha</label><input type="date" id="v-fecha" value="${isoHoy()}"></div>
      <div><label class="lbl">Importe ($)</label><input type="number" id="v-imp" placeholder="Opcional"></div>
      <div><label class="lbl">Repetir cada</label>
        <select id="v-rep">
          <option value="0">Una vez</option><option value="7">1 semana</option>
          <option value="14">2 semanas</option><option value="30" selected>1 mes</option>
          <option value="60">2 meses</option><option value="90">3 meses</option>
          <option value="180">6 meses</option><option value="365">1 año</option>
        </select>
      </div>
    </div>
    <div class="fg fg2" style="margin-bottom:10px">
      <div><label class="lbl">Alertar</label>
        <select id="v-alerta">${['1','3','5','7','10','15'].map(d=>`<option value="${d}"${d==='7'?' selected':''}>${d==='1'?'1 d\xeda antes':d+' d\xedas antes'}</option>`).join('')}</select>
      </div>
      <div><label class="lbl">Nota</label><input type="text" id="v-nota" placeholder="Ej: Pago Fácil"></div>
    </div>
    <button class="btn-p" onclick="guardarVenc()">➕ Agregar vencimiento</button>
  </div>
  <div class="card">
    <div class="card-ttl">Vencimientos de ${esc(sp.name)}</div>
    ${!ord.length?'<div class="empty">Sin vencimientos cargados.</div>':
    `<div style="overflow-x:auto"><table class="tbl">
      <thead><tr><th>Concepto</th><th>Vence</th><th style="text-align:right">Importe</th><th>Estado</th><th></th></tr></thead>
      <tbody>${ord.map(v=>{
        const d=diasHasta(v.fecha),rep=parseInt(v.repetir||0);
        let badge,bc,bg;
        if(v.pagado&&rep===0){badge='✅ Pagado';bc='#1a9e72';bg='#e0f5ec';}
        else if(d<0){badge='⚠️ Vencido';bc='#d63c3c';bg='#fceaea';}
        else if(d===0){badge='🔴 HOY';bc='#d63c3c';bg='#fceaea';}
        else if(d<=3){badge=`🔴 ${d}d`;bc='#d63c3c';bg='#fceaea';}
        else if(d<=parseInt(v.alerta||7)){badge=`🟡 ${d}d`;bc='#c07810';bg='#faeeda';}
        else{badge=`${d}d`;bc='#2878d4';bg='#e3f0fb';}
        const rl=rep>0?`<div style="font-size:11px;color:var(--t3)">${rep===30?'Mensual':rep===365?'Anual':'Cada '+rep+'d'}</div>`:'';
        return`<tr>
          <td><div style="font-weight:600">${esc(v.nombre)}</div>${rl}${v.nota?`<div style="font-size:11px;color:var(--t3);font-style:italic">${esc(v.nota)}</div>`:''}</td>
          <td style="white-space:nowrap;font-size:13px">${fmtD(v.fecha)}</td>
          <td style="text-align:right;white-space:nowrap">${v.importe?fmtM(v.importe):'—'}</td>
          <td><span class="badge" style="background:${bg};color:${bc}">${badge}</span></td>
          <td style="display:flex;gap:4px">
            ${!v.pagado||rep>0?`<button class="btn-xs" style="background:var(--green-bg);color:var(--green-dk);border-color:var(--green)" onclick="pagarVenc('${v.id}')">✓</button>`:''}
            <button class="btn-xs" style="background:var(--red-bg);color:var(--red);border-color:var(--red)" onclick="delVenc('${v.id}')">✕</button>
          </td>
        </tr>`;}).join('')}
      </tbody>
    </table></div>`}
  </div>`;
}

function guardarVenc(){
  const nombre=document.getElementById('v-nom').value.trim();
  const fecha=document.getElementById('v-fecha').value;
  if(!nombre||!fecha){toast('Ingresá nombre y fecha','red');return;}
  const arr=getData(curSpace,'vencs');
  arr.push({id:uid(),nombre,cat:document.getElementById('v-cat').value,fecha,
    importe:parseFloat(document.getElementById('v-imp').value)||null,
    repetir:document.getElementById('v-rep').value,
    alerta:document.getElementById('v-alerta').value,
    nota:document.getElementById('v-nota').value.trim(),pagado:false,_ts:Date.now()});
  setData(curSpace,'vencs',arr);
  document.getElementById('v-nom').value='';document.getElementById('v-imp').value='';document.getElementById('v-nota').value='';
  renderContent();renderAlerts();toast('✅ Vencimiento guardado','green');
}
function pagarVenc(id){
  const arr=getData(curSpace,'vencs');
  const v=arr.find(x=>x.id===id);if(!v)return;
  const rep=parseInt(v.repetir||0);
  if(rep>0){v.fecha=addDays(v.fecha,rep);}else{v.pagado=true;}v._ts=Date.now();v._ts=Date.now();
  setData(curSpace,'vencs',arr);renderContent();renderAlerts();
}
function delVenc(id){
  setData(curSpace,'vencs',getData(curSpace,'vencs').filter(v=>v.id!==id));
  sbDel('vencimientos',id);sbTombstone(id,'vencimientos');
  renderContent();renderAlerts();
}

// ══════════════════════════════════════════════
// TAREAS — KANBAN (todos los espacios)
// ══════════════════════════════════════════════
function buildTareas(){
  const tareas=getTareas();
  const memberFilter=teamMembers.length?`<button onclick="setKanbanFilter('member',this)" style="padding:5px 12px;border-radius:20px;border:1.5px solid #0ea5e9;background:rgba(14,165,233,.1);color:#0ea5e9;font-size:12.5px;font-weight:600;cursor:pointer">👤 ${teamMembers[0]?.member_name||'Martin'}</button>`:'';
  const finToggle=`<label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t3);cursor:pointer;user-select:none">
    <input type="checkbox" ${showFinaliz?'checked':''} onchange="showFinaliz=this.checked;document.getElementById('kanban-wrap').innerHTML=kanbanMode==='semana'?renderKanbanSemana(getTareas(),kanbanFilter):kanbanMode==='mes'?renderKanbanMes(getTareas(),kanbanFilter):renderKanban(getTareas(),kanbanFilter)"> Ver finalizadas</label>`;
  const _km=kanbanMode;
  const viewToggle=`<div style="display:flex;gap:3px;background:rgba(0,0,0,.06);border-radius:8px;padding:3px">
    <button onclick="kanbanMode='estado';renderContent()" style="padding:4px 10px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:${_km==='estado'?'#fff':'none'};color:${_km==='estado'?'#1a1916':'var(--t3)'}">📋 Estado</button>
    <button onclick="kanbanMode='semana';renderContent()" style="padding:4px 10px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:${_km==='semana'?'#fff':'none'};color:${_km==='semana'?'#1a1916':'var(--t3)'}">📅 Semana</button>
    <button onclick="kanbanMode='mes';renderContent()" style="padding:4px 10px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:${_km==='mes'?'#fff':'none'};color:${_km==='mes'?'#1a1916':'var(--t3)'}">🗓 Mes</button>
  </div>`;
  return`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">
    <div style="display:flex;gap:8px;align-items:center">${viewToggle}${finToggle}</div>
    <button class="btn-sec" style="font-size:13px;padding:7px 12px" onclick="nuevaTarea('Sin hacer','${curSpace}')">➕ Nueva tarea</button>
  </div>
  ${userRole==='admin'?`<div style="margin-bottom:10px">
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">
      <button onclick="setKanbanFilter('own',this)" style="padding:5px 12px;border-radius:20px;border:1.5px solid #1a1916;font-size:12.5px;font-weight:600;cursor:pointer;background:${kanbanFilter==='own'||(!['all','member'].includes(kanbanFilter)&&kanbanFilter!=='own')?'#1a1916':'#fff'};color:${kanbanFilter==='own'||(!['all','member'].includes(kanbanFilter)&&kanbanFilter!=='own')?'#fff':'#1a1916'}">Mis tareas</button>
      ${SPACES.map(s=>`<button onclick="setKanbanFilter('${s.id}',this)" style="padding:5px 12px;border-radius:20px;border:1.5px solid ${s.color};font-size:12.5px;font-weight:600;cursor:pointer;background:${kanbanFilter===s.id?s.color:s.bg};color:${kanbanFilter===s.id?'#fff':s.color}">${s.emoji} ${s.name}</button>`).join('')}
    </div>
    ${teamMembers.length?`<div style="display:flex;gap:5px;align-items:center;padding:6px 10px;background:rgba(14,165,233,.06);border-radius:10px;border:1px solid rgba(14,165,233,.2)">
      <span style="font-size:11px;color:#0ea5e9;font-weight:700;text-transform:uppercase;letter-spacing:.05em">Equipo</span>
      <button onclick="setKanbanFilter('member',this)" style="padding:4px 12px;border-radius:20px;border:1.5px solid #0ea5e9;font-size:12.5px;font-weight:600;cursor:pointer;background:${kanbanFilter==='member'?'#0ea5e9':'rgba(14,165,233,.1)'};color:${kanbanFilter==='member'?'#fff':'#0ea5e9'}">👤 ${teamMembers[0]?.member_name||'Martin'}</button>
      <button onclick="setKanbanFilter('all',this)" style="padding:4px 12px;border-radius:20px;border:1.5px solid #888;font-size:12px;font-weight:600;cursor:pointer;background:${kanbanFilter==='all'?'#888':'rgba(0,0,0,.06)'};color:${kanbanFilter==='all'?'#fff':'#888'}">Todos</button>
    </div>`:''}

  <div id="kanban-wrap">${kanbanMode==='semana'?renderKanbanSemana(tareas,kanbanFilter):kanbanMode==='mes'?renderKanbanMes(tareas,kanbanFilter):renderKanban(tareas,kanbanFilter)}</div>`;
}

function setKanbanFilter(f,btn){
  kanbanFilter=f;
  document.getElementById('kanban-wrap').innerHTML=kanbanMode==='semana'?renderKanbanSemana(getTareas(),f):kanbanMode==='mes'?renderKanbanMes(getTareas(),f):renderKanban(getTareas(),f);
}

function renderKanban(tareas,filter){
  const PRIO_O={Alta:0,Media:1,Baja:2};
  return`<div class="kanban-scroll"><div class="kanban">
    ${ESTADOS.filter(e=>showFinaliz||e!=='Finalizado').map((est,ci)=>{
      let cards=tareas.filter(t=>t.estado===est);
      if(filter!=='all'&&filter!=='member')cards=cards.filter(t=>!teamMembers.some(m=>m.member_id===t.user_id));
      if(filter&&filter!=='all'&&filter!=='member'&&filter!=='own')cards=cards.filter(t=>t.space===filter);
      if(filter==='member')cards=cards.filter(t=>teamMembers.some(m=>m.member_id===t.assigned_to||m.member_id===t.user_id));
      cards.sort((a,b)=>(PRIO_O[a.prio]||1)-(PRIO_O[b.prio]||1));
      const isFin=est==='Finalizado';
      const estIdx=ESTADOS.indexOf(est);
      return`<div class="k-col">
        <div class="k-col-hdr">
          <span class="k-col-ttl" style="color:${ESTADOS_C[estIdx]}">${est}</span>
          <span class="k-count">${cards.length}</span>
        </div>
        ${cards.map(t=>{
          const sp=SMAP[t.space]||SPACES[0];
          const pc=PRIO_C[t.prio]||'#888';
          const assignee=teamMembers.find(m=>m.member_id===t.assigned_to);
          const horasAcum=t.tipo==='timed'?(t.horas_log||[]).reduce((s,l)=>s+(l.horas||0),0):0;
          const progPct=t.tipo==='timed'&&t.horas_total?Math.min(100,Math.round(horasAcum/t.horas_total*100)):0;
          let vt='',vc='';
          if(t.fecha&&!isFin){const d=diasHasta(t.fecha);
            if(d<0){vt='Vencida '+Math.abs(d)+'d';vc='venc';}
            else if(d===0){vt='Hoy';vc='hoy';}
            else if(d===1){vt='Mañana';vc='hoy';}
            else{vt=fmtD(t.fecha);}
          }
          return`<div class="k-card${isFin?' k-fin':''}" style="border-left-color:${isFin?'#1a9e72':pc}" onclick="abrirTarea('${t.id}')">
            ${t.tipo==='recurring'?`<span class="tipo-badge" style="background:rgba(124,58,237,.1);color:#7c3aed">🔄 ${{daily:'Diaria',weekdays:'Hábil',weekly:'Semanal',biweekly:'Quincenal',monthly:'Mensual'}[t.recur]||'Diaria'}${t.duracion_min?' · '+t.duracion_min+'min':''}</span>`:''}
            ${t.tipo==='timed'?`<span class="tipo-badge" style="background:rgba(14,165,233,.1);color:#0ea5e9">⏱ Con horas</span>`:''}
            <div class="k-card-ttl">${esc(t.titulo)}</div>
            ${t.tipo==='timed'?`<div class="k-prog-bar"><div class="k-prog-fill" style="width:${progPct}%"></div></div><div style="font-size:10px;color:var(--t3);margin-bottom:3px">${horasAcum}/${t.horas_total||0}h (${progPct}%)</div>`:''}
            <div class="k-card-meta">
              <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${sp.color}"></span>
              <span style="font-size:11.5px;color:${sp.color};font-weight:600">${sp.name}</span>
              <span class="badge" style="background:${pc}18;color:${pc};font-size:11px">${t.prio}</span>
              ${assignee?`<span class="badge" style="background:rgba(14,165,233,.1);color:#0ea5e9;font-size:10px">👤 ${esc(assignee.member_name)}</span>`:''}
            </div>
            ${vt?`<div class="k-vence ${vc}">📅 ${vt}</div>`:''}
            ${isFin?`<div class="k-done-overlay">✓ Finalizada</div>`:''}
          </div>`;}).join('')}
        <button class="k-btn-add" onclick="nuevaTarea('${est}','${curSpace}')">+ Agregar aquí</button>
      </div>`;
    }).join('')}
  </div></div>`;
}

}

function setEstado(id,estado,ci){
  const arr=getTareas();const t=arr.find(x=>x.id===id);if(!t)return;
  t.estado=estado;t._ts=Date.now();
  if(estado==='Finalizado'&&t.tipo==='recurring'){t.recur_completado=isoHoy();}
  setTareas(arr);
  document.querySelectorAll('.status-btn').forEach((b,i)=>{
    const e=ESTADOS[i];
    b.className='status-btn'+(e===estado?' on':'');
    b.style.borderColor=e===estado?ESTADOS_C[i]:'';
    b.style.background=e===estado?ESTADOS_C[i]+'18':'';
    b.style.color=e===estado?ESTADOS_C[i]:'';
  });
  renderAlerts();
  if(estado==='Finalizado'){
    toast(t.tipo==='recurring'?'✅ ¡Hecha! Vuelve mañana 🔄':'✅ Tarea finalizada','green');
  }
}
function editTarea(id,field,val){
  const arr=getTareas();const t=arr.find(x=>x.id===id);if(!t)return;
  t[field]=val;t._ts=Date.now();setTareas(arr);renderAlerts();
}
function delTarea(id){
  setTareas(getTareas().filter(t=>t.id!==id));
  sbDel('tareas',id);sbTombstone(id,'tareas');closeModal();
  if(curMod==='tareas')renderContent();
  renderAlerts();
}

function ntTipoCambio(){
  const t=document.getElementById('nt-tipo').value;
  document.getElementById('nt-recur-fields').style.display=t==='recurring'?'block':'none';
  document.getElementById('nt-timed-fields').style.display=t==='timed'?'block':'none';
}
function crearTarea(){
  const titulo=document.getElementById('nt-tit').value.trim();
  if(!titulo){toast('Ingresá un título','red');return;}
  const tipo=document.getElementById('nt-tipo')?.value||'normal';
  const assignEl=document.getElementById('nt-assignto');
  const assigned_to=assignEl?assignEl.value||null:null;
  const arr=getTareas();
  arr.push({id:uid(),titulo,
    space:document.getElementById('nt-sp').value,
    estado:document.getElementById('nt-est').value,
    prio:document.getElementById('nt-prio').value,
    fecha:document.getElementById('nt-fecha').value||'',
    desc:document.getElementById('nt-desc').value.trim(),
    creada:isoHoy(),_ts:Date.now(),
    user_id:sbUser?.id||null,
    assigned_to,
    tipo,
    duracion_min:tipo==='recurring'?parseInt(document.getElementById('nt-duracion')?.value)||null:null,
    recur:tipo==='recurring'?(document.getElementById('nt-recurdays')?.value||'daily'):tipo==='timed'?(document.getElementById('nt-trecurdays')?.value||'daily'):null,
    recur_completado:null,
    recur_log:[],
    horas_total:tipo==='timed'?parseFloat(document.getElementById('nt-htotal')?.value)||null:null,
    horas_dia:tipo==='timed'?parseFloat(document.getElementById('nt-hdia')?.value)||null:null,
    horas_log:[],
    fecha_inicio:tipo==='recurring'?(document.getElementById('nt-finicio')?.value||null):(tipo==='timed'?(document.getElementById('nt-finicio2')?.value||null):null),
    fecha_fin:tipo==='recurring'?(document.getElementById('nt-ffin')?.value||null):(tipo==='timed'?(document.getElementById('nt-ffin2')?.value||null):null)});
  setTareas(arr);closeModal();
  if(curMod==='tareas')renderContent();
  renderAlerts();toast('✅ Tarea creada','green');
}

function buildNotas(){
  const sp=SMAP[curSpace];
  const notas=getData(curSpace,'notas').sort((a,b)=>b.fecha.localeCompare(a.fecha));
  return`<div class="card">
    <div class="card-ttl">Nueva nota — ${sp.emoji} ${esc(sp.name)}</div>
    <div class="fg" style="margin-bottom:10px">
      <textarea id="nota-txt" rows="4" placeholder="Escribí tu nota, idea o recordatorio..."></textarea>
    </div>
    <button class="btn-p" onclick="guardarNota()">📝 Guardar nota</button>
  </div>
  ${!notas.length?`<div class="empty">Sin notas todavía.<br>Usá este espacio para ideas, recordatorios o apuntes de ${esc(sp.name)}.</div>`:
  notas.map(n=>`<div class="nota-item" onclick="editarNota('${n.id}')">
    <button class="nota-del" onclick="event.stopPropagation();delNota('${n.id}')">✕</button>
    <div class="nota-item-txt">${esc(n.texto)}</div>
    <div class="nota-item-fecha">${fmtD(n.fecha)}</div>
  </div>`).join('')}`;
}

function guardarNota(){
  const txt=document.getElementById('nota-txt').value.trim();
  if(!txt){toast('Escribí algo primero','red');return;}
  const arr=getData(curSpace,'notas');
  arr.push({id:uid(),texto:txt,fecha:isoHoy(),_ts:Date.now()});
  setData(curSpace,'notas',arr);
  document.getElementById('nota-txt').value='';
  renderContent();toast('✅ Nota guardada','green');
}

function editarNota(id){
  const arr=getData(curSpace,'notas');
  const n=arr.find(x=>x.id===id);if(!n)return;
  openModal(`<div class="modal-handle"></div>
    <div class="modal-ttl">Editar nota</div>
    <div class="fg" style="margin-bottom:12px">
      <textarea id="edit-nota-txt" rows="6">${esc(n.texto)}</textarea>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-sec" style="flex:1" onclick="closeModal()">Cancelar</button>
      <button class="btn-p" style="flex:2" onclick="actualizarNota('${id}')">💾 Guardar cambios</button>
    </div>`);
}
function actualizarNota(id){
  const txt=document.getElementById('edit-nota-txt').value.trim();
  if(!txt)return;
  const arr=getData(curSpace,'notas');
  const n=arr.find(x=>x.id===id);if(!n)return;
  n.texto=txt;n.fecha=isoHoy();n._ts=Date.now();n._ts=Date.now();
  setData(curSpace,'notas',arr);
  closeModal();renderContent();toast('✅ Nota actualizada','green');
}
function delNota(id){
  setData(curSpace,'notas',getData(curSpace,'notas').filter(n=>n.id!==id));
  sbDel('notas',id);sbTombstone(id,'notas');
  renderContent();
}

// RESUMEN (solo Personal)
// ══════════════════════════════════════════════
function buildResumen(){
  const gastos=getData('pers','gastos');
  const meses=[...new Set(gastos.map(g=>mesKey(g.fecha)))].sort().reverse();
  const mes=meses[0]||'';
  return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <label class="lbl" style="margin:0">Mes:</label>
    <select id="rs-mes" onchange="renderResumenData()" style="width:auto">
      ${meses.length?meses.map(m=>`<option value="${m}"${m===mes?' selected':''}>${mesLbl(m)}</option>`).join(''):'<option>Sin datos</option>'}
    </select>
  </div>
  <div id="rs-data"></div>
  <script>renderResumenData();<\/script>`;
}

function renderResumenData(){
  const sel=document.getElementById('rs-mes');if(!sel)return;
  const mes=sel.value;
  const gastos=getData('pers','gastos');
  const rmap=Object.fromEntries(RUBROS_PERS.map(r=>[r.id,r]));
  const data=gastos.filter(g=>mesKey(g.fecha)===mes).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const wrap=document.getElementById('rs-data');if(!wrap)return;
  if(!data.length){wrap.innerHTML='<div class="empty">Sin datos para este mes.</div>';return;}
  const total=data.reduce((s,g)=>s+g.importe,0);
  const por={};data.forEach(g=>{por[g.rubro]=(por[g.rubro]||0)+g.importe;});
  const sortedR=Object.entries(por).sort((a,b)=>b[1]-a[1]);
  wrap.innerHTML=`
    <div class="mgrid">
      <div class="met"><div class="met-lbl">Total del mes</div><div class="met-val" style="color:var(--sc)">${fmtM(total)}</div></div>
      <div class="met"><div class="met-lbl">Cant. gastos</div><div class="met-val">${data.length}</div></div>
      <div class="met"><div class="met-lbl">Promedio</div><div class="met-val">${fmtM(total/data.length)}</div></div>
      <div class="met"><div class="met-lbl">Días activos</div><div class="met-val">${new Set(data.map(g=>g.fecha)).size}</div></div>
    </div>
    <div class="card">
      <div class="card-ttl">Por rubro</div>
      ${sortedR.map(([id,amt])=>{const r=rmap[id]||{label:id,color:'#888'};const pct=Math.round(amt/total*100);
        return`<div class="rbar"><div class="rbar-name">${esc(r.label)}</div>
          <div class="rbar-track"><div class="rbar-fill" style="width:${pct}%;background:${r.color}"></div></div>
          <div class="rbar-pct">${pct}%</div><div class="rbar-amt">${fmtM(amt)}</div></div>`;}).join('')}
    </div>
    <div class="card">
      <div class="card-ttl">Detalle</div>
      <div style="overflow-x:auto"><table class="tbl">
        <thead><tr><th>Fecha</th><th>Rubro</th><th>Descripción</th><th style="text-align:right">Importe</th></tr></thead>
        <tbody>
        ${data.map(g=>{const r=rmap[g.rubro]||{label:g.rubro,color:'#888',bg:'#eee'};return`<tr>
          <td style="font-size:13px;white-space:nowrap">${fmtD(g.fecha)}</td>
          <td><span class="badge" style="background:${r.bg};color:${r.color}">${esc(r.label)}</span></td>
          <td style="color:var(--t2);font-size:13px">${esc(g.desc)||'—'}</td>
          <td style="text-align:right;font-weight:700">${fmtM(g.importe)}</td>
        </tr>`}).join('')}
        </tbody>
        <tfoot><tr class="tbl-tot"><td colspan="3">TOTAL</td><td style="text-align:right">${fmtM(total)}</td></tr></tfoot>
      </table></div>
    </div>`;
}

// GLOBAL
// ══════════════════════════════════════════════
function renderGlobal(){
  const area=document.getElementById('content');
  const mesActual=isoHoy().slice(0,7);
  const tareas=getTareas();
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div><div style="font-size:16px;font-weight:700">🌐 Vista global</div><div style="font-size:12px;color:var(--t3)">${mesLbl(mesActual)}</div></div><button onclick="openCalendario()" style="background:rgba(124,58,237,.15);border:1.5px solid rgba(124,58,237,.3);border-radius:10px;padding:8px 14px;color:#a78bfa;font-size:13px;font-weight:600;cursor:pointer">📅 Calendario</button></div>${getDashboardMetrics()}`;;

  // Card resumen tareas
  html+=`<div class="card">
    <div class="card-ttl">Kanban global — todas las tareas</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px">
      ${ESTADOS.map((e,i)=>{const c=tareas.filter(t=>t.estado===e).length;return`
        <div style="background:#f8f7f4;border-radius:8px;padding:10px;text-align:center;cursor:pointer" onclick="goGlobalKanban()">
          <div style="font-size:20px;font-weight:700;color:${ESTADOS_C[i]}">${c}</div>
          <div style="font-size:10.5px;color:var(--t2);margin-top:2px;font-weight:600">${e}</div>
        </div>`;}).join('')}
    </div>
    <button class="btn-sec" style="width:100%;text-align:center;justify-content:center" onclick="goGlobalKanban()">Ver kanban completo →</button>
  </div>`;

  // Cards por espacio
  SPACES.forEach(sp=>{
    const gastos=sp.id==='pers'?getData(sp.id,'gastos').filter(g=>mesKey(g.fecha)===mesActual):[];
    const totalMes=gastos.reduce((s,g)=>s+g.importe,0);
    const vencs=getData(sp.id,'vencs').filter(v=>!(v.pagado&&parseInt(v.repetir||0)===0));
    const vencUrgentes=vencs.filter(v=>diasHasta(v.fecha)<=7&&diasHasta(v.fecha)>=0).length;
    const vencVencidos=vencs.filter(v=>diasHasta(v.fecha)<0).length;
    const tPend=tareas.filter(t=>t.space===sp.id&&t.estado!=='Finalizado').length;
    const notas=getData(sp.id,'notas').length;

    html+=`<div class="global-card" style="background:${sp.bg};border-color:${sp.color}33;cursor:pointer" onclick="goSpace('${sp.id}')">
      <div class="global-card-hdr">
        <div style="font-size:15px;font-weight:700;color:${sp.color}">${sp.emoji} ${sp.name}</div>
        ${sp.id==='pers'&&totalMes>0?`<div style="font-size:17px;font-weight:700;color:${sp.color}">${fmtM(totalMes)}</div>`:''}
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;font-size:13px;color:${sp.dk}">
        <span>✅ <strong>${tPend}</strong> tareas pendientes</span>
        ${vencUrgentes>0?`<span style="color:var(--amber)">⚠️ <strong>${vencUrgentes}</strong> venc. próximos</span>`:''}
        ${vencVencidos>0?`<span style="color:var(--red)">🔴 <strong>${vencVencidos}</strong> vencidos</span>`:''}
        ${sp.id!=='pers'&&notas>0?`<span>📝 <strong>${notas}</strong> notas</span>`:''}
        ${sp.id==='pers'&&gastos.length>0?`<span>💰 <strong>${gastos.length}</strong> gastos este mes</span>`:''}
      </div>
    </div>`;
  });

  area.innerHTML=html;
}

function goGlobalKanban(){
  // Ir a tareas del espacio actual mostrando todo
  isGlobal=false;
  curMod='tareas';
  kanbanFilter='all';
  document.querySelectorAll('.sp-tab').forEach(b=>b.classList.remove('on'));
  const tab=document.getElementById('sptab-'+curSpace);if(tab)tab.classList.add('on');
  buildModBar();
  renderContent();
}

// MODAL
// ══════════════════════════════════════════════
function openModal(html){
  document.getElementById('modal-box').innerHTML=html;
  document.getElementById('modal').classList.add('on');
}
function closeModal(){
  document.getElementById('modal').classList.remove('on');
  if(!isGlobal&&curMod==='tareas')renderContent();
  if(!isGlobal&&curMod==='notas')renderContent();
}

// ══════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════
function toast(msg,tipo='red'){
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:${tipo==='green'?'#1a9e72':'#d63c3c'};color:#fff;padding:10px 18px;
    border-radius:22px;font-size:14px;font-weight:600;z-index:999;
    box-shadow:0 4px 16px rgba(0,0,0,.2);white-space:nowrap;max-width:90vw;text-align:center;transition:opacity .4s`;
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.style.opacity='0',2200);
  setTimeout(()=>el.remove(),2700);
}
