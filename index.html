<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1916">
<title>Mi Sistema</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f2f1ed;--card:#fff;--border:#e4e1d8;--border2:#cdc9bc;
  --t1:#1a1916;--t2:#5a5750;--t3:#9c9890;
  --green:#1a9e72;--green-bg:#e0f5ec;--green-dk:#0d6e4f;
  --red:#d63c3c;--red-bg:#fceaea;
  --amber:#c07810;--amber-bg:#faeeda;
  --blue:#2878d4;--blue-bg:#e3f0fb;
  --safe-b:env(safe-area-inset-bottom,0px);

  /* colores por espacio */
  --sc:#7c3aed; --sb:#eeebfd; --sdk:#5428b8;  /* personal */
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;background:var(--bg);color:var(--t1)}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100%}

/* TOP BAR */
.top-bar{flex-shrink:0;background:#1a1916;position:relative;z-index:10}
.top-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 0}
.app-name{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.2px}
.top-date{font-size:11px;color:rgba(255,255,255,.45)}
.space-tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;padding:8px 10px 0}
.space-tabs::-webkit-scrollbar{display:none}
.sp-tab{flex-shrink:0;padding:8px 14px 10px;border:none;background:none;font-size:13px;font-weight:600;color:rgba(255,255,255,.4);cursor:pointer;border-radius:10px 10px 0 0;transition:all .15s;white-space:nowrap}
.sp-tab.on{background:var(--bg);color:var(--sc)}

/* MOD BAR */
.mod-bar{flex-shrink:0;background:#fff;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
.mod-bar::-webkit-scrollbar{display:none}
.mod-tab{flex-shrink:0;padding:10px 14px;border:none;background:none;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;position:relative;white-space:nowrap;transition:color .13s}
.mod-tab.on{color:var(--sc);font-weight:700}
.mod-tab.on::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2.5px;background:var(--sc);border-radius:2px 2px 0 0}

/* ALERT STRIP */
.astrip-wrap{flex-shrink:0;overflow:hidden}
.astrip{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 12px;background:#fff;border-bottom:1px solid var(--border)}
.astrip::-webkit-scrollbar{display:none}
.astrip-item{flex-shrink:0;padding:6px 8px 6px 0;font-size:12px;font-weight:500;white-space:nowrap;display:flex;align-items:center;gap:4px}
.astrip-item.red{color:var(--red)}.astrip-item.amber{color:var(--amber)}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 24px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.card-ttl{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:11px}

/* FORMS */
.fg{display:grid;gap:8px;margin-bottom:8px}
.fg2{grid-template-columns:1fr 1fr}
.fg3{grid-template-columns:1fr 1fr 1fr}
.lbl{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:3px}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:8px;font-size:15px;font-family:inherit;background:#fff;color:var(--t1);outline:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--sc);box-shadow:0 0 0 3px color-mix(in srgb,var(--sc) 15%,transparent)}
textarea{resize:vertical;min-height:60px}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{padding:5px 12px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid transparent;user-select:none;transition:all .12s}

/* BUTTONS */
.btn-p{background:var(--sc);border:1px solid var(--sdk);color:#fff;width:100%;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-sec{background:#fff;border:1px solid var(--border2);color:var(--t1);padding:9px 14px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-xs{padding:4px 9px;font-size:12px;border-radius:6px;border:1px solid;cursor:pointer;font-weight:600;white-space:nowrap}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{padding:7px 8px;border-bottom:1.5px solid var(--border);font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;background:#f8f7f4;text-align:left}
.tbl td{padding:9px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl-tot td{font-weight:700;border-top:2px solid var(--border);border-bottom:none;padding-top:10px}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11.5px;font-weight:600}

/* RUBRO BARS */
.rbar{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.rbar:last-child{border-bottom:none}
.rbar-name{flex:1;font-size:13px;font-weight:500}
.rbar-track{flex:2;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.rbar-fill{height:100%;border-radius:3px}
.rbar-pct{font-size:11.5px;color:var(--t2);min-width:28px;text-align:right}
.rbar-amt{font-size:13px;font-weight:700;min-width:75px;text-align:right}

/* METRICS */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.met{background:#f8f7f4;border-radius:8px;padding:11px 13px}
.met-lbl{font-size:11px;color:var(--t2);margin-bottom:3px}
.met-val{font-size:19px;font-weight:700}

/* KANBAN */
.kanban-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.kanban{display:grid;grid-template-columns:repeat(4,210px);gap:8px;padding:2px}
.k-col{background:#f8f7f4;border-radius:10px;padding:8px;min-height:100px}
.k-col-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.k-col-ttl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase}
.k-count{font-size:11px;font-weight:700;background:#fff;border-radius:20px;padding:1px 7px;color:var(--t2);border:1px solid var(--border)}
.k-card{background:#fff;border-radius:8px;padding:10px 11px;margin-bottom:6px;cursor:pointer;border:1.5px solid var(--border);border-left:3px solid transparent;transition:border-color .13s}
.k-card:active{background:#f8f7f4}
.k-card-ttl{font-size:13.5px;font-weight:600;line-height:1.3;margin-bottom:5px}
.k-card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.k-vence{font-size:11.5px;margin-top:4px}
.k-vence.venc{color:var(--red);font-weight:600}
.k-vence.hoy{color:var(--amber);font-weight:600}
.k-btn-add{width:100%;padding:8px;border:1.5px dashed var(--border2);border-radius:8px;background:none;color:var(--t3);font-size:13px;cursor:pointer;margin-top:4px}

/* ASISTENTE */
.asist-card{background:linear-gradient(145deg,#111310,#1c2220 60%,#1a2e26);border-radius:14px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden}
.asist-card::after{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none}
.asist-ttl{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.asist-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.asist-field{flex:1;position:relative}
.asist-in{width:100%;padding:11px 46px 11px 13px;border:none;border-radius:9px;font-size:15px;font-family:inherit;background:rgba(255,255,255,.14);color:#fff;outline:none}
.asist-in::placeholder{color:rgba(255,255,255,.4)}
.asist-in:focus{background:rgba(255,255,255,.2)}
.mic{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;background:rgba(255,255,255,.18);color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center}
.mic.rec{background:#e24b4a;animation:pulse 1.1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(226,75,74,.45)}55%{box-shadow:0 0 0 9px rgba(226,75,74,0)}}
.asist-send{padding:11px 14px;border:none;border-radius:9px;background:rgba(255,255,255,.9);color:#111;font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0}
.asist-send:disabled{opacity:.4}
.chat-zone{display:flex;flex-direction:column;gap:7px;max-height:200px;overflow-y:auto;scrollbar-width:none}
.chat-zone::-webkit-scrollbar{display:none}
.bub{max-width:90%;padding:8px 12px;border-radius:12px;font-size:14px;line-height:1.45}
.bub-u{align-self:flex-end;background:rgba(255,255,255,.2);color:#fff;border-bottom-right-radius:3px}
.bub-ai{align-self:flex-start;background:rgba(255,255,255,.93);color:var(--t1);border-bottom-left-radius:3px}
.bub-ai.think{color:var(--t2);font-style:italic}
.bub-ai.err{background:var(--red-bg);color:var(--red)}
.propuesta{background:rgba(255,255,255,.1);border-radius:9px;padding:10px 12px;margin-top:8px}
.prop-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.prop-row:last-of-type{border-bottom:none}
.prop-confirm{width:100%;margin-top:10px;padding:10px;background:#fff;color:#111;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer}

/* NOTAS */
.nota-item{background:#fffdf0;border:1px solid #e8e3c8;border-radius:10px;padding:12px 13px;margin-bottom:8px;position:relative;cursor:pointer}
.nota-item-txt{font-size:14px;line-height:1.5;color:var(--t1);white-space:pre-wrap;word-break:break-word}
.nota-item-fecha{font-size:11.5px;color:var(--t3);margin-top:6px}
.nota-del{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
.nota-del:hover{color:var(--red);background:var(--red-bg)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:300;align-items:flex-end;justify-content:center}
.modal-overlay.on{display:flex}
.modal-box{background:#fff;border-radius:18px 18px 0 0;padding:18px 16px calc(18px + var(--safe-b));width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px}
.modal-ttl{font-size:17px;font-weight:700;margin-bottom:12px}
.status-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.status-btn{padding:7px 8px;border-radius:8px;border:1.5px solid var(--border);font-size:12.5px;font-weight:600;cursor:pointer;background:#fff;color:var(--t2);flex:1;text-align:center;transition:all .13s}

/* GLOBAL */
.global-card{border-radius:12px;padding:14px;margin-bottom:10px;border:1.5px solid transparent;cursor:pointer}
.global-card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}

/* EMPTY */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--t3);font-size:14px}

/* FROW */
.frow{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.frow select{width:auto;min-width:100px}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="top-row">
      <div><div class="app-name">📱 Mi Sistema</div><div class="top-date" id="top-date"></div></div>
      <button onclick="goSpace('global')" style="background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:6px 10px;color:rgba(255,255,255,.65);font-size:12px;font-weight:600;cursor:pointer">🌐 Global</button>
    </div>
    <div class="space-tabs" id="space-tabs"></div>
  </div>
  <div class="mod-bar" id="mod-bar"></div>
  <div class="astrip-wrap" id="alert-strip"></div>
  <div class="scroll-area" id="content"></div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIGURACIÓN
// ══════════════════════════════════════════════
const SPACES = [
  {id:'pers', name:'Personal', emoji:'🏠', color:'#7c3aed', bg:'#eeebfd', dk:'#5428b8',
   mods:['asistente','gastos','vencimientos','tareas','resumen']},
  {id:'tork', name:'Tork',     emoji:'🔧', color:'#1a6eb5', bg:'#e6f0fb', dk:'#0f4a80',
   mods:['tareas','vencimientos','notas']},
  {id:'sant', name:'Santoni',  emoji:'🚗', color:'#d63a1a', bg:'#fbeae6', dk:'#9a2810',
   mods:['tareas','vencimientos','notas']},
  {id:'covi', name:'Covin',    emoji:'🏭', color:'#1a9e52', bg:'#e0f5e9', dk:'#0d6e38',
   mods:['tareas','vencimientos','notas']},
];
const SMAP = Object.fromEntries(SPACES.map(s=>[s.id,s]));

const MOD_LABELS = {
  asistente:'🤖 Asistente', gastos:'💰 Gastos',
  vencimientos:'🔔 Vencimientos', tareas:'✅ Tareas',
  resumen:'📊 Resumen', notas:'📝 Notas'
};

const RUBROS_PERS = [
  {id:'comida_afuera',label:'Comida afuera',   color:'#d85a30',bg:'#faece7'},
  {id:'super_comida', label:'Súper / almacén', color:'#1a9e72',bg:'#e0f5ec'},
  {id:'cuotas_auto',  label:'Cuotas auto',     color:'#6b5ce7',bg:'#edeafd'},
  {id:'servicios',    label:'Servicios',       color:'#2878d4',bg:'#e3f0fb'},
  {id:'salud',        label:'Salud / estética',color:'#d4537e',bg:'#fbeaf0'},
  {id:'impuestos',    label:'Impuestos / ABL', color:'#c07810',bg:'#faeeda'},
  {id:'nafta',        label:'Nafta / transp.', color:'#3b6d11',bg:'#eaf3de'},
  {id:'suscripciones',label:'Suscripciones',   color:'#185fa5',bg:'#e3f0fb'},
  {id:'obra_social',  label:'Obra social',     color:'#0d6e4f',bg:'#e0f5ec'},
  {id:'alquiler',     label:'Alquiler',        color:'#533ab7',bg:'#edeafd'},
  {id:'familia',      label:'Familia',         color:'#854f0b',bg:'#faeeda'},
  {id:'ropa_extras',  label:'Ropa / extras',   color:'#993556',bg:'#fbeaf0'},
  {id:'damasia',      label:'Damasia',         color:'#3c3489',bg:'#edeafd'},
  {id:'otros',        label:'Otros',           color:'#5f5e5a',bg:'#f1efe8'},
];

const ESTADOS = ['Sin hacer','Iniciado','Avanzado','Finalizado'];
const ESTADOS_C = ['#9c9890','#2878d4','#c07810','#1a9e72'];
const PRIOS = ['Alta','Media','Baja'];
const PRIO_C = {Alta:'#d63c3c',Media:'#c07810',Baja:'#2878d4'};

// ══════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════
const lsLoad = k=>{try{return JSON.parse(localStorage.getItem(k))||[];}catch{return [];}};
const lsSave = (k,v)=>localStorage.setItem(k,JSON.stringify(v));
const getData = (sp,type)=>lsLoad(`ms2_${sp}_${type}`);
const setData = (sp,type,v)=>lsSave(`ms2_${sp}_${type}`,v);
const getTareas = ()=>lsLoad('ms2_tareas');
const setTareas = v=>lsSave('ms2_tareas',v);

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
const isoHoy=()=>new Date().toISOString().split('T')[0];
const parseD=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
const fmtD=s=>{if(!s)return'—';return parseD(s).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});};
const fmtM=n=>'$'+Math.round(n||0).toLocaleString('es-AR');
const mesKey=s=>s.slice(0,7);
const mesLbl=k=>{const[y,m]=k.split('-');return new Date(y,m-1,1).toLocaleDateString('es-AR',{month:'long',year:'numeric'});};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const diasHasta=s=>{const h=new Date();h.setHours(0,0,0,0);return Math.round((parseD(s)-h)/86400000);};
const addDays=(s,n)=>{const d=parseD(s);d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];};
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let curSpace='pers', curMod='asistente', isGlobal=false;
let grabando=false, recognition=null, chatHtml='', pendIA=null;
let kanbanFilter='all';

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
window.onload=()=>{
  document.getElementById('top-date').textContent=
    new Date().toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'}).toUpperCase();
  setCSSVars('pers');
  buildSpaceTabs();
  initSpeech();
  goSpace('pers');
};

function setCSSVars(spId){
  const s=SMAP[spId]||SPACES[0];
  document.documentElement.style.setProperty('--sc',s.color);
  document.documentElement.style.setProperty('--sb',s.bg);
  document.documentElement.style.setProperty('--sdk',s.dk);
}

function buildSpaceTabs(){
  document.getElementById('space-tabs').innerHTML=
    SPACES.map(s=>`<button class="sp-tab${s.id===curSpace?' on':''}" id="sptab-${s.id}"
      style="--sc:${s.color}" onclick="goSpace('${s.id}')">${s.emoji} ${s.name}</button>`).join('');
}

function goSpace(id){
  isGlobal=(id==='global');
  if(!isGlobal){
    curSpace=id;
    setCSSVars(id);
    curMod=SMAP[id].mods[0];
  }
  document.querySelectorAll('.sp-tab').forEach(b=>b.classList.remove('on'));
  const tab=document.getElementById('sptab-'+id);
  if(tab)tab.classList.add('on');
  buildModBar();
  renderContent();
  renderAlerts();
}

function buildModBar(){
  const bar=document.getElementById('mod-bar');
  if(isGlobal){bar.innerHTML='';return;}
  const mods=SMAP[curSpace].mods;
  bar.innerHTML=mods.map(m=>`<button class="mod-tab${m===curMod?' on':''}" id="modtab-${m}"
    onclick="goMod('${m}')">${MOD_LABELS[m]}</button>`).join('');
}

function goMod(id){
  curMod=id;
  document.querySelectorAll('.mod-tab').forEach(b=>b.classList.remove('on'));
  const t=document.getElementById('modtab-'+id);
  if(t)t.classList.add('on');
  renderContent();
}

function renderContent(){
  const area=document.getElementById('content');
  if(isGlobal){renderGlobal();return;}
  if(curMod==='asistente') area.innerHTML=buildAsistente();
  else if(curMod==='gastos') area.innerHTML=buildGastos();
  else if(curMod==='vencimientos') area.innerHTML=buildVencs();
  else if(curMod==='tareas') area.innerHTML=buildTareas();
  else if(curMod==='resumen') area.innerHTML=buildResumen();
  else if(curMod==='notas') area.innerHTML=buildNotas();
  afterRender();
}

function afterRender(){
  if(curMod==='asistente'){
    const cz=document.getElementById('chat-zone');
    if(cz){cz.innerHTML=chatHtml;cz.scrollTop=cz.scrollHeight;}
    if(pendIA)showPropuesta(pendIA);
  }
}

// ══════════════════════════════════════════════
// ALERTS
// ══════════════════════════════════════════════
function renderAlerts(){
  const strip=document.getElementById('alert-strip');
  const items=[];
  SPACES.forEach(sp=>{
    getData(sp.id,'vencs').forEach(v=>{
      if(v.pagado&&parseInt(v.repetir||0)===0)return;
      const d=diasHasta(v.fecha),u=parseInt(v.alerta||7);
      if(d<0) items.push({txt:`⚠️ [${sp.name}] ${v.nombre} vencido`,cls:'red',d});
      else if(d<=u) items.push({txt:`${d===0?'🔴 HOY':'🟡 '+d+'d'}: [${sp.name}] ${v.nombre}`,cls:d<=2?'red':'amber',d});
    });
  });
  getTareas().filter(t=>t.estado!=='Finalizado'&&t.fecha).forEach(t=>{
    const d=diasHasta(t.fecha),sp=SMAP[t.space]||SPACES[0];
    if(d<0) items.push({txt:`⚠️ Tarea vencida [${sp.name}]: ${t.titulo}`,cls:'red',d});
    else if(d<=1) items.push({txt:`🔴 Tarea urgente [${sp.name}]: ${t.titulo}`,cls:'red',d});
  });
  items.sort((a,b)=>a.d-b.d);
  if(!items.length){strip.innerHTML='';return;}
  strip.innerHTML=`<div class="astrip">${items.map(i=>`<div class="astrip-item ${i.cls}">${i.txt}</div>`).join('<span style="color:#ddd;padding:0 5px">·</span>')}</div>`;
}

function initSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  recognition=new SR();
  recognition.lang='es-AR';recognition.continuous=false;recognition.interimResults=true;
  recognition.onresult=e=>{
    let t='';for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;
    const el=document.getElementById('asist-in');if(el)el.value=t;
  };
  recognition.onend=()=>{
    grabando=false;
    const btn=document.getElementById('mic-btn');
    if(btn){btn.classList.remove('rec');btn.textContent='🎤';}
    const v=document.getElementById('asist-in');
    if(v&&v.value.trim())setTimeout(enviar,400);
  };
  recognition.onerror=()=>{grabando=false;const b=document.getElementById('mic-btn');if(b){b.classList.remove('rec');b.textContent='🎤';}};
}

function toggleMic(){
  if(!recognition){alert('Necesitás Chrome y https:// para usar el micrófono.');return;}
  if(grabando){recognition.stop();return;}
  grabando=true;
  const btn=document.getElementById('mic-btn');
  if(btn){btn.classList.add('rec');btn.textContent='⏹';}
  const el=document.getElementById('asist-in');
  if(el){el.value='';el.placeholder='Escuchando...';}
  recognition.start();
  setTimeout(()=>{if(grabando)recognition.stop();},15000);
}

const SYSTEM=`Sos un asistente para registrar gastos personales en Argentina. Devolvé SOLO JSON válido, sin backticks ni texto extra.

Rubros disponibles (ID exacto):
comida_afuera: almuerzo, café, merienda, restaurant, pizza, facturas, helado, comida afuera
super_comida: supermercado, verdulería, chino, almacén, carnicería, panadería, Coto, Dia, milas, verdu
cuotas_auto: Toyota Plan, patente, Hilux, Corolla, seguro auto
servicios: EDENOR, luz, gas, AYSA, agua, FULL
salud: farmacia, homeopata, odontólogo, peluquería, depilación, masajes, eritritol, creatina
impuestos: ABL, AFIP, IIBB, expensas municipales
nafta: nafta, combustible, YPF, Shell, peaje, Uber, colectivo
suscripciones: Netflix, YouTube, Spotify, Fibertel, alarma
obra_social: OSDE, prepaga
alquiler: alquiler, Ramona, expensas edificio
familia: Coni, Vicent, Marta, Tonchi, Rosina, Flor, Mari, frutos secos, Damasia
ropa_extras: ropa, lentes, zapatillas, compras extras
otros: lo demás

Modismos: "lucas"=miles (30 lucas=30000), "k"=miles (45k=45000), "mil"=1000
Sin fecha mencionada: usá la de hoy.

Formato (SOLO esto):
{"gastos":[{"rubro":"ID","importe":30000,"desc":"desc corta","fecha":"YYYY-MM-DD"}],"respuesta":"confirmación breve"}
Sin gastos: {"gastos":[],"respuesta":"No entendí, ¿repetís?"}`;

function buildAsistente(){
  return`<div class="asist-card">
    <div class="asist-ttl">🤖 Asistente de gastos personales</div>
    <div class="asist-row">
      <div class="asist-field">
        <input class="asist-in" id="asist-in" type="text"
          placeholder='Ej: "30 lucas almuerzo y 7 café"'
          onkeydown="if(event.key==='Enter')enviar()">
        <button class="mic" id="mic-btn" onclick="toggleMic()">🎤</button>
      </div>
      <button class="asist-send" id="asist-send" onclick="enviar()">→</button>
    </div>
    <div class="chat-zone" id="chat-zone"></div>
    <div id="propuesta-zone"></div>
  </div>
  <div class="card">
    <div class="card-ttl">Ejemplos de voz o texto</div>
    <div style="display:flex;flex-direction:column;gap:5px;font-size:13.5px;color:var(--t2)">
      ${[
        ['"30 lucas almuerzo y 7 café"','→ Comida afuera (×2)'],
        ['"Chino 45k"','→ Súper / almacén'],
        ['"EDENOR 35 mil y nafta 80"','→ Servicios + Nafta'],
        ['"OSDE 928 y farmacia 17 lucas"','→ Obra social + Salud'],
      ].map(([e,r])=>`<div><em style="color:var(--t1)">${e}</em> <strong style="color:var(--sc)">${r}</strong></div>`).join('')}
      <div style="font-size:12px;color:var(--t3);margin-top:4px">Podés dictar varios gastos juntos. Siempre confirmás antes de guardar.</div>
    </div>
  </div>`;
}

async function enviar(){
  const el=document.getElementById('asist-in');
  const txt=el?el.value.trim():'';
  if(!txt)return;
  const btn=document.getElementById('asist-send');
  if(btn)btn.disabled=true;
  if(el)el.value='';
  addBubble(txt,'u');
  addBubble('Procesando...','think');
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,system:SYSTEM,
        messages:[{role:'user',content:`Fecha hoy: ${isoHoy()}\nGasto: ${txt}`}]})
    });
    const data=await r.json();
    removeThink();
    const raw=(data.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(raw);
    if(parsed.gastos?.length>0){
      addBubble(parsed.respuesta||'Revisá y confirmá:','ai');
      pendIA=parsed.gastos;
      showPropuesta(parsed.gastos);
    }else{
      addBubble(parsed.respuesta||'No entendí el gasto.','ai');
      pendIA=null;
    }
  }catch(e){
    removeThink();
    addBubble('Error. ¿Estás en https://?','err');
  }
  if(btn)btn.disabled=false;
}

function addBubble(txt,tipo){
  const id=tipo==='think'?' id="think-bub"':'';
  const cls=tipo==='u'?'bub bub-u':tipo==='err'?'bub bub-ai err':tipo==='think'?'bub bub-ai think':'bub bub-ai';
  chatHtml+=`<div class="${cls}"${id}>${esc(txt)}</div>`;
  const cz=document.getElementById('chat-zone');
  if(cz){cz.innerHTML=chatHtml;cz.scrollTop=cz.scrollHeight;}
}
function removeThink(){
  chatHtml=chatHtml.replace(/<div class="bub bub-ai think" id="think-bub">.*?<\/div>/,'');
  const cz=document.getElementById('chat-zone');if(cz)cz.innerHTML=chatHtml;
}
function showPropuesta(items){
  const pz=document.getElementById('propuesta-zone');if(!pz)return;
  const rmap=Object.fromEntries(RUBROS_PERS.map(r=>[r.id,r]));
  const total=items.reduce((s,g)=>s+g.importe,0);
  let h=`<div class="propuesta"><div style="font-size:11.5px;color:rgba(255,255,255,.5);margin-bottom:7px">Revisá antes de guardar:</div>`;
  items.forEach(g=>{
    const r=rmap[g.rubro]||{label:g.rubro,color:'#888',bg:'#eee'};
    h+=`<div class="prop-row">
      <div><span class="badge" style="background:${r.bg};color:${r.color}">${esc(r.label)}</span>${g.desc?`<span style="font-size:12px;color:rgba(255,255,255,.6);margin-left:5px">${esc(g.desc)}</span>`:''}</div>
      <div style="font-weight:700;color:#fff;white-space:nowrap">${fmtM(g.importe)}</div>
    </div>`;
  });
  if(items.length>1) h+=`<div style="display:flex;justify-content:space-between;padding-top:7px;border-top:1px solid rgba(255,255,255,.15);margin-top:4px"><span style="color:rgba(255,255,255,.7);font-weight:700;font-size:13px">Total</span><span style="color:#fff;font-weight:700">${fmtM(total)}</span></div>`;
  h+=`<button class="prop-confirm" onclick="confirmarIA()">✅ Confirmar y guardar</button></div>`;
  pz.innerHTML=h;
}
function confirmarIA(){
  if(!pendIA)return;
  const arr=getData('pers','gastos');
  pendIA.forEach(g=>arr.push({id:uid(),fecha:g.fecha,importe:g.importe,rubro:g.rubro,desc:g.desc||''}));
  setData('pers','gastos',arr);
  addBubble(`✅ ${pendIA.length>1?pendIA.length+' gastos guardados':'Gasto guardado'}. ¿Algo más?`,'ai');
  pendIA=null;
  const pz=document.getElementById('propuesta-zone');if(pz)pz.innerHTML='';
  renderAlerts();
}

function selChip(id){
  document.getElementById('g-rubro').value=id;
  document.querySelectorAll('#chips-g .chip').forEach(c=>{
    const r=RUBROS_PERS.find(x=>x.id===c.dataset.id)||{bg:'#eee',color:'#888'};
    if(c.dataset.id===id){c.style.borderColor=r.color;c.style.boxShadow=`0 0 0 2.5px ${r.color}44`;}
    else{c.style.borderColor=r.bg;c.style.boxShadow='';}
  });

function guardarGasto(){
  const fecha=document.getElementById('g-fecha').value;
  const importe=parseFloat(document.getElementById('g-imp').value);
  const rubro=document.getElementById('g-rubro').value;
  const desc=document.getElementById('g-desc').value.trim();
  if(!fecha||!importe||importe<=0||!rubro){toast('Completá rubro, fecha e importe','red');return;}
  const arr=getData('pers','gastos');
  arr.push({id:uid(),fecha,importe,rubro,desc});
  setData('pers','gastos',arr);
  document.getElementById('g-imp').value='';
  document.getElementById('g-desc').value='';
  document.getElementById('g-rubro').value='';
  document.querySelectorAll('#chips-g .chip').forEach(c=>{
    const r=RUBROS_PERS.find(x=>x.id===c.dataset.id)||{bg:'#eee'};
    c.style.borderColor=r.bg;c.style.boxShadow='';
  });
  renderTablaGastos();
  toast('✅ Gasto guardado','green');
}

function renderTablaGastos(){
  const mes=document.getElementById('f-mes')?.value||'';
  const gastos=getData('pers','gastos');
  const rmap=Object.fromEntries(RUBROS_PERS.map(r=>[r.id,r]));
  const data=gastos.filter(g=>!mes||mesKey(g.fecha)===mes).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const wrap=document.getElementById('tabla-g');if(!wrap)return;
  if(!data.length){wrap.innerHTML='<div class="empty">Sin gastos.</div>';return;}
  const total=data.reduce((s,g)=>s+g.importe,0);
  wrap.innerHTML=`<div style="overflow-x:auto"><table class="tbl">
    <thead><tr><th>Fecha</th><th>Rubro</th><th>Descripción</th><th style="text-align:right">Importe</th><th></th></tr></thead>
    <tbody>
    ${data.map(g=>{const r=rmap[g.rubro]||{label:g.rubro,color:'#888',bg:'#eee'};return`<tr>
      <td style="font-size:13px;white-space:nowrap">${fmtD(g.fecha)}</td>
      <td><span class="badge" style="background:${r.bg};color:${r.color}">${esc(r.label)}</span></td>
      <td style="color:var(--t2);font-size:13px">${esc(g.desc)||'—'}</td>
      <td style="text-align:right;font-weight:700;white-space:nowrap">${fmtM(g.importe)}</td>
      <td><button class="btn-xs" style="background:var(--red-bg);color:var(--red);border-color:var(--red)"
        onclick="delGasto('${g.id}')">✕</button></td>
    </tr>`}).join('')}
    </tbody>
    <tfoot><tr class="tbl-tot"><td colspan="3">Total</td><td style="text-align:right">${fmtM(total)}</td><td></td></tr></tfoot>
  </table></div>`;
}

function delGasto(id){
  setData('pers','gastos',getData('pers','gastos').filter(g=>g.id!==id));
  renderTablaGastos();
}

            <div class="k-card-meta">
              <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${sp.color}"></span>
              <span style="font-size:11.5px;color:${sp.color};font-weight:600">${sp.name}</span>
              <span class="badge" style="background:${pc}18;color:${pc};font-size:11px">${t.prio}</span>
            </div>
            ${vt?`<div class="k-vence ${vc}">📅 ${vt}</div>`:''}
            ${t.desc?`<div style="font-size:12px;color:var(--t2);margin-top:4px;line-height:1.3">${esc(t.desc.slice(0,70))}${t.desc.length>70?'…':''}</div>`:''}
          </div>`;}).join('')}
        <button class="k-btn-add" onclick="nuevaTarea('${est}','${curSpace}')">+ Agregar aquí</button>
      </div>`;
    }).join('')}
  </div></div>`;
}

function abrirTarea(id){
  const t=getTareas().find(x=>x.id===id);if(!t)return;
  const sp=SMAP[t.space]||SPACES[0];
  openModal(`<div class="modal-handle"></div>
    <div style="margin-bottom:8px"><span class="badge" style="background:${sp.bg};color:${sp.color}">${sp.emoji} ${sp.name}</span></div>
    <div class="modal-ttl">${esc(t.titulo)}</div>
    <label class="lbl">Estado</label>
    <div class="status-row" style="margin-bottom:12px">
      ${ESTADOS.map((e,i)=>`<button class="status-btn${t.estado===e?' on':''}"
        style="${t.estado===e?`border-color:${ESTADOS_C[i]};background:${ESTADOS_C[i]}18;color:${ESTADOS_C[i]}`:''}"
        onclick="setEstado('${id}','${e}',${i})">${e}</button>`).join('')}
    </div>
    <div class="fg fg2">
      <div><label class="lbl">Espacio</label>
        <select onchange="editTarea('${id}','space',this.value)">
          ${SPACES.map(s=>`<option value="${s.id}"${t.space===s.id?' selected':''}>${s.emoji} ${s.name}</option>`).join('')}
        </select>
      </div>
      <div><label class="lbl">Prioridad</label>
        <select onchange="editTarea('${id}','prio',this.value)">
          ${PRIOS.map(p=>`<option${t.prio===p?' selected':''}>${p}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="fg" style="margin-bottom:8px">
      <label class="lbl">Fecha límite</label>
      <input type="date" value="${t.fecha||''}" onchange="editTarea('${id}','fecha',this.value)">
    </div>
    <div style="margin-bottom:12px">
      <label class="lbl">Notas</label>
      <textarea rows="3" onchange="editTarea('${id}','desc',this.value)">${esc(t.desc||'')}</textarea>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-sec" style="flex:1" onclick="closeModal()">Cerrar</button>
      <button onclick="delTarea('${id}')" style="padding:9px 14px;background:var(--red-bg);color:var(--red);border:1px solid var(--red);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">🗑 Eliminar</button>
    </div>`);
}

function setEstado(id,estado,ci){
  const arr=getTareas();const t=arr.find(x=>x.id===id);if(!t)return;
  t.estado=estado;setTareas(arr);
  document.querySelectorAll('.status-btn').forEach((b,i)=>{
    const e=ESTADOS[i];
    b.className='status-btn'+(e===estado?' on':'');
    b.style.borderColor=e===estado?ESTADOS_C[i]:'';
    b.style.background=e===estado?ESTADOS_C[i]+'18':'';
    b.style.color=e===estado?ESTADOS_C[i]:'';
  });
  renderAlerts();
}
function editTarea(id,field,val){
  const arr=getTareas();const t=arr.find(x=>x.id===id);if(!t)return;
  t[field]=val;setTareas(arr);renderAlerts();
}
function delTarea(id){
  setTareas(getTareas().filter(t=>t.id!==id));
  closeModal();
  if(curMod==='tareas')renderContent();
  renderAlerts();
}
function nuevaTarea(estado,space){
  openModal(`<div class="modal-handle"></div>
    <div class="modal-ttl">Nueva tarea</div>
    <div class="fg" style="margin-bottom:8px">
      <label class="lbl">Título</label><input type="text" id="nt-tit" placeholder="¿Qué hay que hacer?">
    </div>
    <div class="fg fg2">
      <div><label class="lbl">Espacio</label>
        <select id="nt-sp">${SPACES.map(s=>`<option value="${s.id}"${s.id===space?' selected':''}>${s.emoji} ${s.name}</option>`).join('')}</select>
      </div>
      <div><label class="lbl">Estado</label>
        <select id="nt-est">${ESTADOS.map(e=>`<option${e===estado?' selected':''}>${e}</option>`).join('')}</select>
      </div>
    </div>
    <div class="fg fg2">
      <div><label class="lbl">Prioridad</label>
        <select id="nt-prio">${PRIOS.map(p=>`<option>${p}</option>`).join('')}</select>
      </div>
      <div><label class="lbl">Fecha límite</label><input type="date" id="nt-fecha"></div>
    </div>
    <div class="fg" style="margin-bottom:12px">
      <label class="lbl">Notas</label>
      <textarea id="nt-desc" rows="2" placeholder="Detalles opcionales..."></textarea>
    </div>
    <button class="btn-p" onclick="crearTarea()">✅ Crear tarea</button>`);
}
function crearTarea(){
  const titulo=document.getElementById('nt-tit').value.trim();
  if(!titulo){toast('Ingresá un título','red');return;}
  const arr=getTareas();
  arr.push({id:uid(),titulo,
    space:document.getElementById('nt-sp').value,
    estado:document.getElementById('nt-est').value,
    prio:document.getElementById('nt-prio').value,
    fecha:document.getElementById('nt-fecha').value||'',
    desc:document.getElementById('nt-desc').value.trim(),
    creada:isoHoy()});
  setTareas(arr);closeModal();
  if(curMod==='tareas')renderContent();
  renderAlerts();toast('✅ Tarea creada','green');
}

// ══════════════════════════════════════════════
// NOTAS (empresas)
// ══════════════════════════════════════════════
function buildNotas(){
  const sp=SMAP[curSpace];
  const notas=getData(curSpace,'notas').sort((a,b)=>b.fecha.localeCompare(a.fecha));
  return`<div class="card">
    <div class="card-ttl">Nueva nota — ${sp.emoji} ${esc(sp.name)}</div>
    <div class="fg" style="margin-bottom:10px">
      <textarea id="nota-txt" rows="4" placeholder="Escribí tu nota, idea o recordatorio..."></textarea>
    </div>
    <button class="btn-p" onclick="guardarNota()">📝 Guardar nota</button>
  </div>
  ${!notas.length?`<div class="empty">Sin notas todavía.<br>Usá este espacio para ideas, recordatorios o apuntes de ${esc(sp.name)}.</div>`:
  notas.map(n=>`<div class="nota-item" onclick="editarNota('${n.id}')">
    <button class="nota-del" onclick="event.stopPropagation();delNota('${n.id}')">✕</button>
    <div class="nota-item-txt">${esc(n.texto)}</div>
    <div class="nota-item-fecha">${fmtD(n.fecha)}</div>
  </div>`).join('')}`;
}

function guardarNota(){
  const txt=document.getElementById('nota-txt').value.trim();
  if(!txt){toast('Escribí algo primero','red');return;}
  const arr=getData(curSpace,'notas');
  arr.push({id:uid(),texto:txt,fecha:isoHoy()});
  setData(curSpace,'notas',arr);
  document.getElementById('nota-txt').value='';
  renderContent();toast('✅ Nota guardada','green');
}

function editarNota(id){
  const arr=getData(curSpace,'notas');
  const n=arr.find(x=>x.id===id);if(!n)return;
  openModal(`<div class="modal-handle"></div>
    <div class="modal-ttl">Editar nota</div>
    <div class="fg" style="margin-bottom:12px">
      <textarea id="edit-nota-txt" rows="6">${esc(n.texto)}</textarea>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-sec" style="flex:1" onclick="closeModal()">Cancelar</button>
      <button class="btn-p" style="flex:2" onclick="actualizarNota('${id}')">💾 Guardar cambios</button>
    </div>`);
}
function actualizarNota(id){
  const txt=document.getElementById('edit-nota-txt').value.trim();
  if(!txt)return;
  const arr=getData(curSpace,'notas');
  const n=arr.find(x=>x.id===id);if(!n)return;
  n.texto=txt;n.fecha=isoHoy();
  setData(curSpace,'notas',arr);
  closeModal();renderContent();toast('✅ Nota actualizada','green');
}
function delNota(id){
  setData(curSpace,'notas',getData(curSpace,'notas').filter(n=>n.id!==id));
  renderContent();
}

// ══════════════════════════════════════════════
// RESUMEN (solo Personal)
// ══════════════════════════════════════════════
function buildResumen(){
  const gastos=getData('pers','gastos');
  const meses=[...new Set(gastos.map(g=>mesKey(g.fecha)))].sort().reverse();
  const mes=meses[0]||'';
  return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <label class="lbl" style="margin:0">Mes:</label>
    <select id="rs-mes" onchange="renderResumenData()" style="width:auto">
      ${meses.length?meses.map(m=>`<option value="${m}"${m===mes?' selected':''}>${mesLbl(m)}</option>`).join(''):'<option>Sin datos</option>'}
    </select>
  </div>
  <div id="rs-data"></div>
  <script>renderResumenData();<\/script>`;
}

function renderResumenData(){
  const sel=document.getElementById('rs-mes');if(!sel)return;
  const mes=sel.value;
  const gastos=getData('pers','gastos');
  const rmap=Object.fromEntries(RUBROS_PERS.map(r=>[r.id,r]));
  const data=gastos.filter(g=>mesKey(g.fecha)===mes).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const wrap=document.getElementById('rs-data');if(!wrap)return;
  if(!data.length){wrap.innerHTML='<div class="empty">Sin datos para este mes.</div>';return;}
  const total=data.reduce((s,g)=>s+g.importe,0);
  const por={};data.forEach(g=>{por[g.rubro]=(por[g.rubro]||0)+g.importe;});
  const sortedR=Object.entries(por).sort((a,b)=>b[1]-a[1]);
  wrap.innerHTML=`
    <div class="mgrid">
      <div class="met"><div class="met-lbl">Total del mes</div><div class="met-val" style="color:var(--sc)">${fmtM(total)}</div></div>
      <div class="met"><div class="met-lbl">Cant. gastos</div><div class="met-val">${data.length}</div></div>
      <div class="met"><div class="met-lbl">Promedio</div><div class="met-val">${fmtM(total/data.length)}</div></div>
      <div class="met"><div class="met-lbl">Días activos</div><div class="met-val">${new Set(data.map(g=>g.fecha)).size}</div></div>
    </div>
    <div class="card">
      <div class="card-ttl">Por rubro</div>
      ${sortedR.map(([id,amt])=>{const r=rmap[id]||{label:id,color:'#888'};const pct=Math.round(amt/total*100);
        return`<div class="rbar"><div class="rbar-name">${esc(r.label)}</div>
          <div class="rbar-track"><div class="rbar-fill" style="width:${pct}%;background:${r.color}"></div></div>
          <div class="rbar-pct">${pct}%</div><div class="rbar-amt">${fmtM(amt)}</div></div>`;}).join('')}
    </div>
    <div class="card">
      <div class="card-ttl">Detalle</div>
      <div style="overflow-x:auto"><table class="tbl">
        <thead><tr><th>Fecha</th><th>Rubro</th><th>Descripción</th><th style="text-align:right">Importe</th></tr></thead>
        <tbody>
        ${data.map(g=>{const r=rmap[g.rubro]||{label:g.rubro,color:'#888',bg:'#eee'};return`<tr>
          <td style="font-size:13px;white-space:nowrap">${fmtD(g.fecha)}</td>
          <td><span class="badge" style="background:${r.bg};color:${r.color}">${esc(r.label)}</span></td>
          <td style="color:var(--t2);font-size:13px">${esc(g.desc)||'—'}</td>
          <td style="text-align:right;font-weight:700">${fmtM(g.importe)}</td>
        </tr>`}).join('')}
        </tbody>
        <tfoot><tr class="tbl-tot"><td colspan="3">TOTAL</td><td style="text-align:right">${fmtM(total)}</td></tr></tfoot>
      </table></div>
    </div>`;
}

// ══════════════════════════════════════════════
// GLOBAL
// ══════════════════════════════════════════════
function renderGlobal(){
  const area=document.getElementById('content');
  const mesActual=isoHoy().slice(0,7);
  const tareas=getTareas();
  let html=`<div style="font-size:16px;font-weight:700;margin-bottom:2px">🌐 Vista global</div>
    <div style="font-size:12px;color:var(--t3);margin-bottom:14px">${mesLbl(mesActual)}</div>`;

  // Card resumen tareas
  html+=`<div class="card">
    <div class="card-ttl">Kanban global — todas las tareas</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px">
      ${ESTADOS.map((e,i)=>{const c=tareas.filter(t=>t.estado===e).length;return`
        <div style="background:#f8f7f4;border-radius:8px;padding:10px;text-align:center;cursor:pointer" onclick="goGlobalKanban()">
          <div style="font-size:20px;font-weight:700;color:${ESTADOS_C[i]}">${c}</div>
          <div style="font-size:10.5px;color:var(--t2);margin-top:2px;font-weight:600">${e}</div>
        </div>`;}).join('')}
    </div>
    <button class="btn-sec" style="width:100%;text-align:center;justify-content:center" onclick="goGlobalKanban()">Ver kanban completo →</button>
  </div>`;

  // Cards por espacio
  SPACES.forEach(sp=>{
    const gastos=sp.id==='pers'?getData(sp.id,'gastos').filter(g=>mesKey(g.fecha)===mesActual):[];
    const totalMes=gastos.reduce((s,g)=>s+g.importe,0);
    const vencs=getData(sp.id,'vencs').filter(v=>!(v.pagado&&parseInt(v.repetir||0)===0));
    const vencUrgentes=vencs.filter(v=>diasHasta(v.fecha)<=7&&diasHasta(v.fecha)>=0).length;
    const vencVencidos=vencs.filter(v=>diasHasta(v.fecha)<0).length;
    const tPend=tareas.filter(t=>t.space===sp.id&&t.estado!=='Finalizado').length;
    const notas=getData(sp.id,'notas').length;

    html+=`<div class="global-card" style="background:${sp.bg};border-color:${sp.color}33;cursor:pointer" onclick="goSpace('${sp.id}')">
      <div class="global-card-hdr">
        <div style="font-size:15px;font-weight:700;color:${sp.color}">${sp.emoji} ${sp.name}</div>
        ${sp.id==='pers'&&totalMes>0?`<div style="font-size:17px;font-weight:700;color:${sp.color}">${fmtM(totalMes)}</div>`:''}
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;font-size:13px;color:${sp.dk}">
        <span>✅ <strong>${tPend}</strong> tareas pendientes</span>
        ${vencUrgentes>0?`<span style="color:var(--amber)">⚠️ <strong>${vencUrgentes}</strong> venc. próximos</span>`:''}
        ${vencVencidos>0?`<span style="color:var(--red)">🔴 <strong>${vencVencidos}</strong> vencidos</span>`:''}
        ${sp.id!=='pers'&&notas>0?`<span>📝 <strong>${notas}</strong> notas</span>`:''}
        ${sp.id==='pers'&&gastos.length>0?`<span>💰 <strong>${gastos.length}</strong> gastos este mes</span>`:''}
      </div>
    </div>`;
  });

  area.innerHTML=html;
}

function goGlobalKanban(){
  // Ir a tareas del espacio actual mostrando todo
  isGlobal=false;
  curMod='tareas';
  kanbanFilter='all';
  document.querySelectorAll('.sp-tab').forEach(b=>b.classList.remove('on'));
  const tab=document.getElementById('sptab-'+curSpace);if(tab)tab.classList.add('on');
  buildModBar();
  renderContent();
}

// ══════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════
function openModal(html){
  document.getElementById('modal-box').innerHTML=html;
  document.getElementById('modal').classList.add('on');
}
function closeModal(){
  document.getElementById('modal').classList.remove('on');
  if(!isGlobal&&curMod==='tareas')renderContent();
  if(!isGlobal&&curMod==='notas')renderContent();
}

// ══════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════
function toast(msg,tipo='red'){
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:${tipo==='green'?'#1a9e72':'#d63c3c'};color:#fff;padding:10px 18px;
    border-radius:22px;font-size:14px;font-weight:600;z-index:999;
    box-shadow:0 4px 16px rgba(0,0,0,.2);white-space:nowrap;max-width:90vw;text-align:center;transition:opacity .4s`;
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.style.opacity='0',2200);
  setTimeout(()=>el.remove(),2700);
}
</script>
